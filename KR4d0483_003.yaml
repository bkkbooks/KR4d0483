body:
  text: 知非堂稿卷三元何中撰五言律詩述懷文藻風流盡天機定偶然自憐有今日猶復望他年道逺雲千里樓危雪滿川春還有消息好去到梅邊除夕厯象羲和逺誰將舊恨新燈前數杯酒宇内幾閒人豪傑悲來闕江山識故春今宵分兩嵗看劒不妨頻正月五日吾族諸老儒服縱逰縱遊二十士逺賞物華新好是小蘭若一來中聖人桃源在何處流水不勝春歸路狂歌甚敧敧烏角巾又山中忘世換人事又從新儒服吾宗老南冠故國人悲風千載淚幽谷一年春折取山花供清香已滿巾又有計能興漢無辭可美新才名歸後輩事業見前人野水孤村暮梅花萬里春斜川同日月漉酒正須巾幽尋意適可幽尋天空曉氣沉鷗飛一川逈花落五雲深庾子江南恨瓊奴柱下吟野風吹我老鴻雁有餘音晚興雁背霜花落吟悲興自如天虚鱗甲動山老鬢毛疎斷隴暮歸客寒溪人自漁蒼茫閉籠落正爾緩羊車遺老遺老今猶在方知有亂離為言前宋事曽見理宗時邑逺何年到身臞獨步危已無桃可種力穡賴諸兒春郊湖海獨垂釣風雲入短蓑燕來春已去花少雨偏多一飲捐愁却千盃奏醉何青山如有意對我獨高歌又試數亂離年傷情更惘然牛羊荒草樹天地老風烟白骨蒼苔外山花野水邊幽禽未棲宿來徃自翩翩又歸鳥情方逺啼鵑泪未收淵明姑託醉老杜不勝愁雲冷花無主山寒雨似秋江南春水足何處具扁舟雨後晚行太虚萬籟動獨臥一畝隂雨足歸雲逺溪流到海深古今同此意天地一何心我興聊復爾露花沾我襟又漫適閒中意應知事外情江山歸釣影天地入笳聲小市風烟合孤村竹樹清眼中賒小景収拾即詩成又棲鳥黄昏後歸牛蒼莽間水明疑有月烟淡欲無山幽谷元非隱髙人自喜閒徘徊不能去莎碧耿荒灣伯父堅白道人輓詞晝静清江獄臨江録事叅軍春調衣錦絃知興國縣去妖人共異息盜史堪傳使節臨鄉國郎星照楚天穆陵親擢士公不愧諸賢又栗里陶元亮南陽葛武侯事功今代見壯志古人求短屐漫岡晚深衣老圃秋公心無可遡遽徃帝鄉遊又我亦公猶子公寧忍棄吾恍疑容色在還聴語音無風急鵷鶵冷天清雁影孤九京良感激慟哭洒寒蕪老圃堂雨臯某不可復懷哉步蒺藜江山宜有史風雨可無詩漢殿金人别唐陵石馬馳物情猶若此公意竟誰知又深谷紫芝曲南山白石歌斯人嗟已矣此恨果如何扇裏薰風在花間暮雨多悲吟聲已苦一鳥下庭柯喜雨雲葉來西北風聲乍疾徐㝠㝠天下雨湛湛圃中蔬書傳堪經世乾坤且負鋤欲言無與領獨立看芙渠雪共喜輕堪玩寧知積更明隂凝兩儀合勢壓九州平江海漁蓑樂山林茗椀清何嘗不竒絶誰望一朝晴竒石竒石争迎立青杉互引前泠泠兩溪水淡淡一峰烟閒作題嵒字時逢採藥仙蒼崖恐陡絶松影一颸然山中何處征徭急兹山水石竒鳥鳴新葉長磴轉斷雲移趺坐天正碧起行風自遲徑穿松罅去巾袂罥蛛絲㣲雪㣲雪寒烟淡逺村喬木平年登猶有殍政猛更聞兵亂水投陂急羣峯照野明酒盃無限興詩句有餘情别羅士鼎晚煙寒雁度夜月逺鐘㣲髙韵非今世清評閉野扉始知千載上未與寸心違落葉荒山路獨憐身是歸送喻道人歸蜀鶴鳴山社主猶無國西枝更有家早貪吳景媚今恨蜀程賒山豈東南異仙寧逺邇差鶴鳴更須到方足養丹砂又縁重身真患時移事盡非蘧廬誰是住華表底堪歸郢路雪霜苦錦江消息稀天長翅翎短休傍暮雲飛曉晴一雨生春色千山起曉晴落花縈樹轉幽鳥過林鳴杳杳天如古茫茫世有兵開扉小倚杕沙上草初生南居寺閉户未從容出門誰適從聊隨碧溪轉忽與白鷗逢小雨十數㸃淡烟三四峯峰峯看不足山寺已鳴鐘饒州道上新晴破積隂淑氣泛行襟千里山河眼百年耆舊心霞飛滄海逺烟入緑村深學劒江東者茫茫不可尋又手舂初歇杵麥粥午香知白酒村村薄青山處處竒天垂雙鶴逺江渡一舟遲楓合東吳緑何人續楚辭采山歸步松邊採藥去谷裏帶雲歸步轉半崖側影涵空澗㣲獨尋茅宇歇因看水舂機數㸃山花落孤禽避客飛象牙潭遇風圓盖吹應側東溟倒欲乾數㠶將雨急萬燕逆烟摶缺淚經頻拭低昻儘自安還將長嘯處雙槳破空寒病中感懐多病他鄉外孤懷始覺愁山圍雙鷺曉門閉一蟬秋遇合馮生鋏勲名季子裘悠悠耦耕者端暇為人謀夢鄒明逺時遇金溪楊方心達形空滯神交夢自歸江山真有待時命且相違君母虵杯悟吾親鶴髮稀殊方今夜雨偏向小窻飛留金溪夜雨逹旦有懐忽見干戈動他鄉隔老親一牕如此雨兩地未歸人雁渡闗山暗鷄催海宇晨誰能更攲枕聊挹曙光新陳家源恐是仙源裏山從洞口開茅簷無客到稚子恠人來塘緑魚迎日林清雀啄苔欲令幽賞足石道泝縈迴又翠霧斷崖側丹霞流水西竹從幽處密松自古來敧落葉半藏路清風時滿溪仙家元不逺未許衆人知龍池寺蒲石底有貪竒意吾行亦偶然尋泉經絶壑看石到幽禪鳥語前林日雞聲曲巷烟偶逢樵客歇共坐偃松邊留文江久雨值水半世長為客却悲行旅艱相知惟有雨四望更無山命寄浮沉裏心遺生死間丈夫要經涉可復事安閒白鷺洲淡淡薰風度江明天影開竹隂侵水碧草色近人來諸老心猶在千年首獨囬非無李供奉却少鳳凰臺甘詠之輓詞經傳明精義圖書貫大全曽為諸老敬不受衆人憐風雅力還古林泉清欲仙南州餘此士北客識髙賢又花嶼風醒酒琳宫日度棋高談千載靡浮俗萬端疑栁暗西湖路梅殘東閣枝篇章須爛漫知復寄從誰又獨鶴城闉語聲蜚到竹林安知名一世不忍負初心良晤情方切幽居病已深俄然隔千古慙恨淚盈襟劉太博輓詞懇欵憂危國從容友大臣竟孤嬰臼志遂作綺園身名節非無壽乾坤更有人堂堂天下士何必畫麒麟又妙悟通羣聖㣲言判六經千年遺此老四海失先生文字空傳迹知聞漫敬名豈無房杜者猶足致隆平又如許龍門近胡寧忍濶疎不為終古别詎信此生虚未始壺丘學頗知揚子書向來香一瓣薄命竟何如程揔管挽詞行意心追古材髙道即師澤深三族浹庇逺萬間資蒼隼須秋擊甘霖入望遲東南此人物天意遺明時又偶奉親從養因令季保城詎知求偉績不忍毒蒼生厚禄君恩重浮雲世事輕翛然拂塵服身退更為榮又雨露深喬木乾坤啟徳門勲名雖盡幻施報始堪論四海天球在他年上蔡蕃門人更須慟奕奕久彌存寄鄒明逺就問訊諸友宴坐列芳植鸎聲春雨餘空齋三夜夢逺道一封書能事身増病窮居計未疎諸賢日相樂我獨問何如聶氏丈人室八尺床敷愜清平許客過堪容四翁隠頗覺七賢多山逼隂留席池藏水禁波此中惟可飲新釀近如何送曽教諭之官萬安今雨深春色江花暎餞樽近看斜照下轉覺校官尊山色通講席灘聲到縣門金閨須布武六學始堪論立秋夕作但覺焦原苦何當沛澤流夕風㣲報響古木暗藏秋未事㝠難測閒心逺作愁亂山髙下碧烟靄淡浮浮雨餘桂花盛開搔首發清磬開扉啼早鴉西風一夜雨丹桂滿林花老託心猶壯愚云識有加平生讀書眼閒送曉天霞次吳仲谷離字韵一闕聊信意相遇若相期賤子方成喜先生便語離梅花迎客發山色待人知從此圖經裏應添所賦詩送巡檢之官栁州轉覺為官易皇仁貫地維更無方域限寕有徼巡時丹荔栁侯廟紫苔韓子碑弓刀多暇日煩為拂蛛絲陳母姜氏輓歌閨閫芳猷著鄉閭盛徳尊早為三鳳母晚托八龍孫世有金鑾美人誰琬琰存堂堂韓吏部銘碣照髙原槎溪岸斷風攲栁村寒雨病花妄心貪自適危路得長嗟别壑亂雲散危灘歸鷺斜平生謝康樂幽意滿天涯元真寺橋小憇古刹傳清梵横橋雨歇時年華流水在春事落花知宇宙遺陳跡江山本後期向來多薄命今日信枯藜送人歸臨川金河疎栁外去櫂響流澌為客有歸日送人愁别時寒雲隨雁逺南雪到山遲舊隱書無恙行藏莫豫期絶江掛席亂驚湍曽過此渡難潮歸揚子晚山入秣陵寒聽語知鄉近忘年計日寛稳行隨夜泊烟火滿江干登峨眉亭蒼壁孤亭立彫年獨上時㠶歸空渚早雁落信潮遲烟火聨三郡波瀾動兩眉袁宏成絶響李白厭諛辭鄱陽湖中除夕除夕生能幾誰無骨肉親望鄉偏恨路在逺并遺身湖雪殘波岸船燈獨夜人淹旬須一到珍重故園春行樂行樂當幽賞晴峯帶雪欹水香梅落處沙潤草生時事識心仍累身添疾畀衰深村紅葉路樵牧轉相知辛亥元夕頑坐故貪黙忽行時自言寒沙梅影路㣲雪酒香村時序鬢髮改人家童稚喧街頭試燈候不到郭西門送吴主簿之官石埭簿領池州去開㠶帶雨㣲當令公事簡見説縣人稀雲入九華碧雁驚秋浦飛丁寧橋下水官滿載書歸贈李仲元曽逢偏意悟顔面費追思把酒忽相語計年深自悲亂山藏路逺秋水去城遲若到寒溪上教兒護菊籬别唐仲謙記名長似識相見始慚非每到極言罷却欣幽聴稀日明山氣改江静水痕歸添得今朝别城隂空掩扉水口夜思牢落不成寐荔隂寒石磯潮生灘響盡海近夜涼歸旅思隨時進鄉音逐逓非燕南與粤北恰是費征衣山墅幽居好效穆伯長山墅幽居好烟霞紫翠鄉近窻皆水色通屋盡花香報曙啼鶯慧驚春乳燕忙不須頻諦視淡艶小林塘其二山墅幽居好隂霏長緑蘿地藏禽響異門掩草香多曉日明媒雉晴峰對牧鵝有時隨野豎吹笛小船坡其三山墅幽居好隨人事事宜祝雞行蟻盡乳犬穴虵移瓶瀋佳泉煮厨烟落葉炊藤香和棘刺扶補便成籬其四山墅幽居好清闕託静深罏薰太古意方册聖人心霄漢詩情到秋毫字法尋開簾散疎孏燒燼落花隂其五山墅幽居好花時不惜情前身曽作蝶有夢亦隨鶯艶得渾無格移來不計程每煩人客到指㸃問何名其六山墅幽居好工持結夏規静扶楓本釣沉算竹根棊原本闕其七山墅幽居好農談到夜分側林斜淡月遥石長幽雲鄰屋燈明盡磚爐酒氣聞兒童催就枕露㸃落紛紛其八山墅幽居好秋苔席月明伏龍扶甲影飛鶴發毛英河漢清丹極星辰淡玊衡殘荷兩三畝時聴籜飛聲其九山墅幽居好加籩不外將帽紗梨谷露衣氅橘林霜醒妙疑仙教蔬珍共婦嘗一竿元放手風席碧灘長其十山墅幽居好瓶儲嵗計終問梅經古刹看雪到危峰鲫穴寒漁雋麞溪曉獵蹤速隣相勞苦行閣炭香濃讀晦菴集刼重魔偏勝言髙俗每疑屈伸應有待真偽竟難知燒燭成花處看書徹卷時嫩涼秋滿院蟲響起前墀吳仲谷來喜雨山居難適俗到縣動經年偶出成竒絶相看各粲然酒深孤菊外燈淡小樓偏草草荀陳事他時倘有傳贈旴江黄季與徃宜春訪舊識孔知事此地忽相見驚心十載期未詢行處事先説别時詩小市見人喜北風征㠶馳如何不蹔駐總是舊相知牡丹異錦星孫巧竒雲夢女神珊瑚離鐵網翡翠糁金塵天上花難並仙家畫莫親如何元化力獨釀一根春除夕我有百除夕蘧廬是處安翻因歸路近始覺到家難浦隔雁聲落篷孤燈影寒家人應共説賔閣尚盤桓五言排律節婦周母鍾氏挽詞毓徳推閨秀來嬪盛壼彛詩成自誓日孝盡立孤時被教三遷早娱親一檄遲里門人共式汗簡史應垂燕喜髙年集情深愛日馳丹沙蓬海淺綘節婺星移松栢闕龍近風烟過雁悲區區劉子政僅就挽人詞陳峭軒挽詞良璞未有識需時為席珍淺清滄海地齊汨吕梁津桂楫以前溺闕枰入至神千金何瀆魯六印不酬秦瑶圃花光曙麟洲酒影春青鞋天地闊緗帙古今陳遇物聊施愛於情每以真百年椿峍屼四世玊嶙峋盛徳誰與讓能言寫未親仲弓今已矣碑版属何人陳提舉輓歌虞日來儀鳳周郊早畜麟方推王式化已客馬周身事合符休運才猷接近臣東朝深雨露北極上星辰儤直宫闈密官箴簿領勤剸繁蘇劇縣決訟讋豪民餘事脩班序髙名動搢紳奉徵資筦庫䝉冶剰輸銀計日堪經國知年急養親纔酧三釡志遽造九京人陳寔家聲在吳兢史筆新徵銘宜狀實痛誄最情真秋雨昏山色寒烟黯路塵蒼茫幽竁處哀挽競傷神梅竒植遺山澤英姿照古今醴薰貫三極貝色表千林年運神孤王隂凝力獨任太清涵妙影元氣託芳心薄雪村村淡輕烟澗澗隂蒼茫何見晚邂逅卻愁深南紀開春事幽情寄碧岑自憐餘短䇿相對發孤斟移菊僅得林間趣閒尋菊本移人家深竹裏楓葉夕陽時汲井澆畦潤將鋤下手遲護叢愁蕋損帶土怕根知毎被歸樵問深憐冷蜨隨寒香生徑術幽事補灣碕斗柄西北落雁聲霜露垂裵囘繞叢畔自笑可能癡寄程承㫖元凱同嚴召闕班錫異恩聖神思治切宗社有公存地立鼇峰峻天依鳳闕尊臯䕫侔道合旦奭共心論闕幹時雍化丕揚祖烈敦堯文嚴大典虞采倚昌言卦氣丹凝鼎星符紫照垣竒齡歸碩徳寳厯鞏皇元花竹蕃三谷雲霞煥九門相望清晝永朝下酒盈樽皮氏逸亭地僻藏吾逸隨宜託數椽池新何許水楓壽不知年竹讓前林月花歸隔浦天綵麟孤鏡照幽哢四窻圓曲几清時裏閒心太古前入因添曉起出每及宵眠句得思仙寄棋髙許客傳乾坤餘蠧簡勛業老觥船智有過榮計先求勝祖鞭大章短東極夸父恨虞淵世共稱工者吾知付莞然他時耆舊傳應指某公賢黄體元别業因梁為亭范徳機榜玊壺氷掲曼碩賦古律余賦今律十韵何處來竒璞雕鎪締搆工置之孤嶼外渺在十洲中石色摇晴雪林輝貫夜虹貪寒龍伯到愛潔鶴仙同拂席栁隂緑繙書花影紅盃増瑪瑙瑩簾訝水晶宫可倩凌人守休令暍子通疑神塵自逺比徳日應崇橘窄堪容隠虀清亦䇿功試言蔚宗輩好為傳壺公送伊拉齊僉事赴南䑓英簜來江右人歸水鏡中豺狼當道失麟鳳在郊容玊尺嚴於已金鈞聴以公龍沙方集雁烏府遂乗騘不逞評弹巧惟恢宇量洪列城瞻朗月南夏洒清風江漾檣竿采天摇酒影紅若為談去住猶未逺帲幪紫極星辰切青㝠雨露同遂知秣陵水直與析津通送董方達赴廣東與計曽偕上承恩列校官黨庠為長易藩府事人難秩幸三年滿朝無一迹安要荒乗逺障巡徼謝儒冠行李書籖減嚴程水驛寒庾梅留雪待韶石帶雲看歴歴多竒境層層下激湍山藏蠻鳥怪峽束夜猿酸潮上雄都近烟希小市闕蜑人行獵熟獠婦挈瓶歡俗險平為貴民疲猛易殘長教榕䕃緑莫戀荔林丹善政宜無怠清名自不刋九重求士急一旦在朝端味勿貪珍異衣唯稱袷單好成南海闕歸櫂候江干寄題凌氏横舟閣世有要津路居當野水潯千年濟川事一片渡人心天地闕蓑老風烟弄笛沉岸花時自落沙栁坐成隂艤棹堪誰待臨河有嘆音行車常自尼吾識固能任人物多豪俊江山幾古今巴東竒傑句為爾一長吟知非堂稿卷三
