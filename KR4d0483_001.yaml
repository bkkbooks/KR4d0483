body:
  text: 知非堂稿卷一元何中撰五言古詩别謝提刑戊子十一月二十四日拜疊山先生於雙桐驛蓋先伯見山同丙辰理宗親擢也先生敘舊好言同心焉明日中賦二詩為别峩峩樓觀地寂寂風雨墟可憐零落身萬里投修途窅窕千蛾眉已奉他人娛主恩天罔極苟生豈良圖行行重行行善保千金軀别懷不敢訴顧步復踟蹰二吳門白日落孤妾悲洞房徙倚無所歸朔風滿羅裳昔為春桞隂今作秋菊黃芳景不速盡愁心與俱長逝者魂魄在九京共徜徉粲粲河壯氷蕭蕭天雨霜出門即逺道死生永相望安上人蘭若獨尋小蘭若積翠森松筠禽聲悟禪家幽花吐清芬晴日水光合時飛野鴨羣姢姢前山秀適來何處雲清心欣有得淡焉失腥氛道人煮春茗離坐與晤言亦忘此境邃兩耳天樂聞何當脫世網於焉窮朝曛菊我耕不半畝黃花列千叢蕭條變衰時一夕萬里風孤立不作難英英異風骨君看墻東客夜寒步霜月又黃花來何晚及此秋霜繁寄語山外人棄捐我何言幽芳具四時要在培深根我來繞花行我道將無存又菊花如幽人梅花如烈士同居氷雪中標格不相似道里阻荒塞故人萬里餘菊枝儻可折持以寄逺書墨梅客攜數尺紙手展墨色鮮江梅發踈花蕭然瞰清川淡月挂寒枝孤幽弄芳妍豈非立雕後或是標春先日月相往還何用悲嵗年此花於此時好修乃獨賢處士窮幽居羇臣懷左遷裁詩孤山雪擁屩羅浮煙我今亦何恨仰視空青天世俗不貴真共把墨粉傳玄帝雖令嚴此花不俱玄于何幻素質物性亦復然夢中如聞香殘更悟醉眠起來索梅花寂寞江之壖讀史桓桓韓將軍當年誰寄目豈無漂母食亦有胯下辱雄劒一朝飛舉手拾秦鹿風雷走倐爍乾坤困馳逐滎陽廣武間楚漢寄我足王業四百年尺封屢翻覆賞厚豈勢搖功成乃身戮所貴英雄人豈甘草中伏誰為後來者感此空碌碌舉頭見青天天邊有鴻鵠又嬴法四海熱震蕩昏三光雲飛大風起赤子沐清涼當時周旋人一瞰罹身殃悠悠赤松子不識為何祥千年有崔浩前修持自彰豈知愧所事乃是元家王恐非鳯銜圖但見鴈求粱伊爾山中人勿棄蘭蕙芳又鼎移炎德燼南陽尚躬耕胸中經濟事感我三顧誠保蜀非王基何似田一成顧豈志功名乃欲表忠精煌煌漢家業草木豈無情誰知鄴中兒元是漢人生運去身或移事往恨難平悠悠梁父吟終古有餘聲穆山山中江南有丘壑我生良獨間秋風二三友朅來逰兹山山深不見寺但見飛泉寒地行兩山挾天風鳴珮環青煙從何來墮我泉林端未知有徑否鐘磬猶未殘長歌萬谷應仰見數峰攢紆餘緣澗入側步寒雲關豁然得空曠聊復解破顔殿靜蘚花潤松危鶴聲乾僧寶炯數珠相我槃礴觀大開雙白眼應接幾青鬟徘徊日已晚人間行路難猛虎蔽叢薄潛蛟潄風湍振衣出山去大嘯驚人寰雜述姬末既文敝嬴強淪九疇炎德屹肇基王風遂回輈繼繼崇禪讓終始還相酬忽焉兹道絶魚羊莽齊州遙知後來者亦與豐沛儔荒哉結繩初爾來幾千秋大化不停運有生步其流此時偶際會昔昔射旄頭又天龍地用馬健順理亦宜誰於其兩間赤手握隂機東門一長嘯四海皆驚迷向來種桃人此去當何之悠悠黃唐逺來者邈難期龍逝白雲征馬輕九坂馳行行馬上郎萬里長風吹不見長江邊折盡楊桞枝又月蠧桂不植桐枯鳯來遲髙峯不顧返尚念榮與衰全身古所貴逃名亦何為自昔青門人不識東陵時天地始一息人道乃如斯昭文已無琴默與萬化齊但酌一樽酒得醉聊自怡又蕭蕭白楊風依依吹井煙曠哉上下宇逝者不待年彼隴亦何祥一日幾新阡誰招皋某復遞哭送九泉髙樓當西日落花滿寒川流浪曠劫間彭殤俱可憐漢陵春蕭瑟回首尚變遷萬古一起滅此意何茫然又至人守玄宅寸虛莫能傾俯觀萬化機寓化亦寓生道去終不復行葦有遺聲帝者獨何居混沌無聰明培風高翮翔冥冥亂雲擁周流駕言旋夜寒煙霧重身如江湖樽瓠落豈無用歸來無何鄉三珠倚孤夢夜久夜久闕步珠露空盈襟蕭條川氣髙慘淡浦色侵河橫星漸轉霧厚山將沉鳴蟲促繁響蜚螢亂寒隂時物遂如此惻愴抱寸心天將落月去何當復東臨乾坤入冥漠衆竅酣哀音欲令萬夢覺誰憂獨難任商歌浩忘疲俯仰情逾深忽聞雞聲起左右風滿林讀晉史林疏暑風劇窗户殊未涼悠然倦不力吾我已俱忘眼醒見周秦眼醉逰軒黃日月山外過興廢枕中藏振衣起長嘯六合何軒昻斯人縱髙視旁皇復旁皇于焉讀晉史感激繫中腸言言不能已自笑己如狂又哀榮無盡變俯仰還自推陳留既作賓何如山陽時中都血流杵江左中興基不待卯金刀嬴強吕已移天道巧相復人理固易知巢由遇髙躅今古無還期又天地一虛器所寄在斯人人能主天地豈不貴我身嗟哉嵇阮輩酒鄉為隱淪朝醉既及暮暮醉還及晨裸飲或稱逹喪闕乃名真獨善諒非計況此國與民被髮祭伊川豈不在諸臣平陽有餘恨千載同悲辛又蟄龍臥滄淵瑞鳯棲蓬海悠悠接輿歌千古消光彩出處酌其宜勿為世所駭預人家國事此身固有在嗣宗濟世心無為著逹莊叔夜明養生東市援琴傷一出與一處徒能決藩墻淳風竟不返二子俱亡羊汲郡蘇門山其人逰何鄉我欲振竒翮碧宇追翺翔又髙平釋時論魯褒錢神篇晉轍固難挽猶勝談虛玄夷甫晚良悔將死復何言誰登平乘樓尚能議諸賢老莊異端學冥合歸自然蕭曹相業大文景王道便尊尚本非異興衰由此遷信知浮論者亡國有餘愆又江左二百年立國初何恃中夜荒雞鳴天地皆英氣枕戈劉越石擊楫祖士稚如此中原間端能了公事局促并豫州竒功中道墜嗚呼二豪雄本為宗社計異類禽獸心推議諒非意石死故可哀稚則吾何議徒懷墟墓間還念金行祀誰令若思來後代常歔欷又兩賢不相厄王庾乃如斯天步政多艱此豈私憤時東山謝安石造次威鳯儀三賢抱宏器繼出相等夷風流文雅盡同惟世所推但恨立朝間典禮殊未施玄談竟澆俗逆臣終亂階湯武肇王業伊周垂綱維桓景彰伯道管晏橫要規古人不作逺所立百世師奈何民具瞻退食徒委蛇卜世固天定欲責當誰歸又春風滿南國公子爭為歡錦繡少花艷珊瑚耀日寒美人佩蘭麝驄馬馳雕鞍酣歌金谷逈笑舞涼臺寬一朝化為血付與來世歎人國亦如此榮落朝夕看悠悠勸進者端似墜樓難又填石闕膠杯誰能舟我豈不知我量力乃哲謀有才比管葛感奮為武侯保身慕夷齊靜退淵明儔物亦非所忌名亦非所求北忩羲皇上東籬晉宋秋零陵一杯酒終古屬斯愁秋雨昔者三月晴厚地裂欲隳積地一月雨厚地融欲糜不知穹穹者若此何以為隂陽相鑿枘自怒還自怡風吹黍穟黑下方人怨咨怨咨猶尚可實自地難持我有斸藥鑱于以待朝飢有聲不敢吐坐看松雪垂偶書桐寒葉落風菊淨花開雨掩映半畦秋好竹三四五對此憔悴人忽笑不復語掩卷掩卷如鬱鬱鬱鬱亦何似野人每多憂不悟本無事仰觀千載前去者極所詣俯期千載後來者邈難至惟我於其間欲䇿無名驥出門萬里逺寸挽何能至山空白雲合日黑野風駛獨默已如瘖間送飛鴉墜次羅士鼎韻别羅以通桐花滿天地鳯衰竟何鳴豈無雙綵翼誰與相目成山長回風駛道暗浮雲征孤飛良獨苦吾道寧虧盈乃持一箭書欲破萬古城寸心挽來世日月當回精我亦願追隨難可覔形聲志合身復乖良晤何難并君持黃金鞭微徑所不經我無匹雛力敢擬世上英豈知一日别遂有千載情明發隔山雨何當與細評逰芙蓉山十四首十里五里石一步一長嗟行行山轉高悠悠日將斜縈折抵深谷直下十數家來往自成村桃栁映桑麻崖杉老絳葉石棕垂枯花隂凝四時雪陽焰一川霞誰令余到此幽意浩無涯行將辦畚鍤來此耕山畬又岩岩青芙蓉峻秀琢寒玉危流千丈飛鏗鍧石相觸幽閟魚龍宫荒寒霧雨蓄凄神不可留前登散遐矚參差雜花動香氣泛深谷日照丹霞開萬峰洗晴緑同心有長鑱緩尋靈藥斸葛仙早見招庶得從所欲又春風吹衆樹春喚如鳴梭平煙帶逺村時聞樵者歌田父有真樂東皋牧羣鵝煙暖衆草合艷緑如流波搔首負白日歡然得婆娑事立或福的識深乃愁多西家酒正熟況此天氣和又側足上翠微石磴八九折開盡滿崖花坐來羣香歇逰目盡逺空亂數碧簮列草木頗蔥蘢雲興復霞蔚不知十日雨還長幾枝蕨山中無事業特用慰採擷盈筐歸路遙忽見滿山月又緑峰在頭上落月在腳下點點煙鬟開春晴真無價紅泉響哀玉蒼石飲渴馬林窮蘭雪香崖古蘿衣挂屬聞絶壑底松聲更清灑世逺事難即趣深月彌暇誰知須臾間白雲已無罅都失眼中竒茫然獨悲吒又孔雀本毒類文章飾其身翠尾列金花鮮麗足移人持以比百鳥鴟鵠猶為仁出門遇田父相對言語真桑麻暨粟麥自有事實存但觀田畝間足想二代淳長歌唐風詩笑入桃花源又逐日果何益俱至虞淵隈功能寧足誇戮力與時偕移山良自苦負土期山頺山若不自移志願終難諧長算恨日短逺山惜運推有為未足恃超視良可哀古人日日去後人日日來若復不自間千載誰當懷又花開風自柔谷深日無暉髙蘿鳥聲轉蔥翠搖隂霏孤娛有窮深境異心不移東峰虎長嘯西澗麞爭啼運往人理盡物新古道違欣然抱竒懷白雲遙相知日夕意猶緬信有忘歸時又雜花生佳樹羣女已出桑村深無秋胡笑語頗相忘著身入淳俗自然和其光時讀種樹書理近意更長山林足造化我土不敢荒自時一畦菜蒼翠儼成行殺竹插籬援所以貴周防雖無人我欺深畏牛與羊倘或踐吾菜前功詎能償雖悔復何益空使寸心傷又親友日以疏鄰曲時復至相見晴雨外極論耕種事我正春酒熟斟酌無次第開園摘緑蔬淡煮有真味相勸人一生所得在幾醉淺深各盡量但以醉為劑聖人亦朽骨我輩復何恃共賞此言是更酬到夢寐日斜鳥聲樂風過花香駛客散冠巾欹我亦歸去睡又日日碧山去香草生還踏幽禽識履聲間鳴故相狎意行不知逺清嘯得虛答石上緑雲生岩下紫煙合莫負今日晴聊折山花插又商山非逺遐胡為可避世人間己帝秦紫芝尚周味看瓜有竒禍紛紛誰能避此翁良優遊乃為秦所置獨恨六籍尊反受陋儒纍倘使誠德人羅者誰敢睨蕭散東陵侯隱約濟南士清風百世存庶激懦夫志又我慕陶淵明能怡田畝情日夕飲名酒不知有此生乞食固非辱在官亦何榮當其高臥時但覺宇宙輕間靜性獨樂不以矯激成極陳形影神尤戒無營營雖非晉宋秋寧計世間名道勝不知物天全妙無聲聊述吾所慕詎更待吾評春曰書懷肅肅春隂厚衆花不敢妍似為天所妬故著急雨湔好醜一時盡園林生緑煙亂雲猶峥嶸端坐自蕭然鶯聲日景迫栁色春序遷心期諒難語縹眇罏香傳又墻東緑隂好稍覺朝日遲人間事輪囷我枕聊復攲開扉覽曉色萬端集兩眉風狂忽倒人迎立愛其吹掠我徑西去花影闕逶迤微吟視青天一笑聊自持相如不妨慢長康政酒癡我懷何悄悄彼日何炎炎寸心通來古寂寞捲疏簾間我一叢菊青闕映前簷秀色何怡恱更著雨闕添林間此竒事乃許我輩兼聊持千載意以寓百嵗淹神龍安可擾不用固應潛又蛙聲池上起竹聲窗外傳吹萬不可息聒我春晝眠林外固多纍林間復多喧誓欲躡太清冥冥不得前以我一寸心焚香小窗邊以我無盡目送此有盡煙溪行悄悄抱孤懷悠悠步芳甸微風動半林細雨濕雙燕髙堂狡獪人一瞬幻千變似嫌俗眼白遮斷逺峰面參差雙鷺下點破寒溪練立處不近人忽去何所見李千户至自南海分遺椰實喜賦亂餘乏佳實賤者猶貴之招呼梨栗輩已作席珍推豈無仙人棗無脛至山蹊桓桓李將軍色映海嶠竒歸馬馱椰子濩落魏瓠垂徇華殼初剖濯濯膾玉肥來餉山中人意重千金遺香釅缺石髓味腴輕肉芝尊前有南海頓壓衆果卑向當逋子齡侍親曲江湄啖此不知厭亦與檳榔宜既别十五年猶有夢往時故人忽相見喚起三生悲遇舊心易快感至情還移百年能有此再見安可期子西憂蜜果東坡嘆荔枝雖云供貢勞吾念君臣儀安得白玉盤登之白玉墀萬古還綱常不令世愈衰蒼茫叫虞舜魂繞天南維梅花滿庭淨香煙一簾遲椰杯更自酌聊欲捐余思嵗晚詠懷四首隂風入空林玄雲羃平野薄帷負閟寒飛雪鳴古瓦抱衾不成溫孤懷浩難寫荒荒豺虎區三殤無遺者王風同列國安得猶存雅黃竹聲久沉傷來泪盈把其二前簷立間夜園中珍木長雪雲正澄徹霜飈復飄揚衆星憑幽暗各出爭耀芒東方起圓月失此萬點芒不有照燭功何以尊其光安得騎蟾蜍偃息桂樹傍其三天霜不停威寒莖日以稿厲飈竟欲脫未許依藂老南山多白石終嵗常皓皓乃知得至靜超然全所保妄盡無非天心寧不違道雕落奚作懷鍾山有神草其四門扃幽樹聲窗銷羣峰影寒氣迎遙夜華星在西嶺秋蟲無餘聲時雁有新警天機自消長冥參得深省名衢萬里轍理海載孤艇力弱昧前馳心強遡真境即俗幸無能淡然聊自領城中雨後何處山中煙移向城隂飛乃知一雨過光景與昨非心虛納浩蕩神邁得精微勿語馬上郎癡我似我譏鳥雀十數點空翔若無依城中彈丸多故林應未稀華蓋山三山立天半蒼翠橫古今斷崖三萬丈花落紫煙深路蟠一帶危上薄元氣侵亂霞導飛舄間雲護行襟風嵒虎豹穴泉壑蛟龍吟川明散衆色空碧生清音仰憩星河次飛鳥下階臨肅然剛風近仙人撫瑶琴立身如此髙人世寧不欽蒼茫萬里色浩蕩一寸心期為太清逰不獨往山林又三山白雲合乘我空中行天近通一氣風清來逺聲翛然臥髙寒五曉天雞鳴下臨人世秋縱覽鶴馭輕翩翩半崖端稍稍千村明餘雲垂衆壑龍鳳紛送迎忽然各散去放作世間晴日色到逺林輕煙靄靄生亂紅點長空罻羅己相驚丈夫有髙步所兾還丹成聖人似堯舜巢許猶逃名禮華與樂葉俱隨秋樹零紛紛各在眼歎息難為情松野即事羅氏園林五首娛心仗老笻細數諸峰影微煙過前樹淡日有半嶺幽鳥識歸宿遑恤雲路永冥鴻各有見日邊半行整出處無定期是非諒難省歸林忽已夜夜月變光景其二采采園中菊青青不堪摘沉思何不開我土稿無液汲水聊一溉誓欲效綿力詎能樂安間所為造化惜少年莫相猜此意君應識屬聞毁折多使我愈戚戚其三山窗一叢蕙修葉吐紫㽔或云斷續花我亦豈敢疑楚澤多芳草真偽奚難知浮俗尊虛名君子傷令姿博觀貴自得清芬良在兹枝葉安足辨但令無自欺其四兩禪著冠巾園林步逍遙微風所披拂衆樹皆蕩搖悠然一眺間快甚羣憂銷紫氣涵逺村髙霞照青霄薄暮忽行旅平疇散歸樵亦復掩幽扉夜意終寥寥其五間雲正相聚長風歘散之聚散每如此我懷焉不悲仰觀何所見所見天離離但當飲名酒寸心始不移醉中無一事去盡識與知數樹洞庭霜足為嵗寒資松柏即賔客終始無瑕疵逺離别空村落葉亂曠野飛雲遲抽盡園客繭難比妾相思自從出門來足繭坼兆龜夜宿茅篁雜曉行霜露凄仰攀千重岑俯涉百渡溪骨肉無一在親戚知為誰羣刀血糢糊殺人相娛嬉有聲不敢吐有淚不敢垂妾魂久已逝妾身終何之行行忽遇兵擾擾貪獲資力戰豈不勝何意救蒸黎鄉兵又妄虜無異在賊時朝汲風激面暮舂日皴肌妾無使令者逺勝妾在兹寄言北去鳥妾死君得知自從結婚姻得偹奉盥匜幸甚終所託可保黃髮期苟死又何憾有此生别離自盡亦非難兾君贖妾歸君心寧絶妾望君君來斯又恐多險艱為妾使君危怫鬱一寸心撩亂百結絲牽牛與織女乖隔始不疑昨夜夢到家銀燭照華榱夢覺恍見君回回日如迷果如兩龍劒長懷想望悲人人儻如妾何以生世為逰燒香寺於道傍折桂而歸遂賦欲捐世間憂徑尋林下寺古松工聽法幽鳥靜通慧鐘撞清國聲臺識先朝事山僮偵茶候道人玩香穟回看爭奪區始了西來意無生安得滅有患非所致金仙一何髙淡然無可纍茫茫曠大劫幽草供深翠出門見東村孤吹隨風駛前林衆木竒醲薰隱幽桂飄揚滿虛空狂逐浩無際冥參超欲仙闕玩倐已逝偶聞非售知抱竒寧立異詎能媚司命深歎招隱士持歸難贈人銅瓶且勤置秋日山行雜興四首獨往非避俗散懷聊尋芳流風淡翠麓理䇿秋路長蒼石含幽色樛木落寒香一片太古雲化為孤鳳翔忽然歸紫霄蕩漾不可望浩歌向夕霽敢事接輿狂其二山回杉熛清崖傾花雨下詎知吾道非偶然適曠野磊落萬隕星赴流飲奔馬風微葉時落磴寒雪自灑孤松縈蘿轉幽峰抱嵐炧景晦良遇稀心異真賞寡舉手謝時人巖隂棲古瓦其三晚山菡萏開濃秀映秋碧長風瀉萬里寒花落石壁雲氣靜欲消霞光亂相射縹眇浮丘翁素手垂鶴翼笑看蓬萊波與世共陳迹天地無恆春羣兒倚少色功名猶自誤口體乃相賊安知骨為塵不得同瓦礫其四運去絶榮念化遷悟妄身舞智巧行殺亦笑榮公貧深谷無近患寒蘿抱餘春幽娛淡忘歸山水無緇磷風生禽響發雨歇草色新回眺宇宙間忽覺無一人長嘯斷崖側悄愴將何親駭機滿岐路踏步安可輕所來為流泉倚石得細聆激烈蒼龍笛雍容紫鷥笙清輝灑空曲餘韻盤林扄至音含元化抑揚極和平區區理琴絲傾意俟人聽可憐望知已斷絃復何情由書堂寺入夫容之麓五代時有胡先生隱居其地寺故名云今碑不書有遊生者寫華嚴經留寺清整可觀生寧宗時人雨歇入幽麓朝氣籠淡晴夷途何所慮乃此沿流行夭矯玉虬飛驚波候天明急播萬珠絡遞應千雷轟忽激羣鷺躍徐肆逰絲縈曲曲揭清淺盤盤度崚嶒明生一掬緑幽閟兩林清胡為夥生聚却羡非世嬴蒼煙出磬響深谷藏經聲間過小蘭若茶香滿前楹誰寫天竺書秋雁點寒汀盛代安可及隅谷有精能嘗聞昔五季胡君亦豪英讀書向此地詎兾千載名俗士輕高人不著石麗牲空令繞竹泉長作琅琅鳴寸心持餘感出門陟寒青駮石當目隙髙下擁精靈朋聚鳥闕伏孤兀蒼虎獰左峰覆欲壓右崖危將傾乾坤有此險始闕性命輕前邁忽自哂天定亦何驚萬杉列雲際濃淡因雲成佳棕交翠竹茅屋矗相憑向來看畫意盡向眼中生老翁理泉竇東災秧事興隃謂樂如此翁顰訴其情歷述先朝美言罷淚縱橫方余起醲羡屬聞意冥冥古來多隱者全身一何精將非智不及亦豈福難勝不然幽勝地自可飽芝苓放麑心不忍力極還小停歌吟雜悲樂寫之蒼石屏他年有知者此語良足徵白馬篇冥冥子規林蕭蕭洛陽路白馬誰家兒揚鞭西南去去去知何為不辭還濘苦隂陽速相禪乾坤幾新故丈夫慎馳騖闕渚已艱步悠悠獨鳥沒霧暗連村樹黃塘渡早聞東吳路今識黃塘灘聊乘舴艋過一篙濟艱難緑秧映屋秀古木垂村寒曠野何所尊亂躍千平巒回眺寒煙外浮屠乃上干乾坤我來遲促促寧遑安遙謝山中人合眼無悲歡文江夜舟北斗一何渴下飲空江流南雁知何愁相喚不自休東浦征人歸孤燈出籬幽西淵捕魚急飛火走一舟漢皇極寬仁今年租稅優有生亦擾擾吾道更悠悠箬嶺人家溪回谷深盤石厄水成布風吹嵒下雲挂在溪東樹雨深兩岸花髙下樓臺聚安知主為誰倚遍欄干去又秩風流平野麥雲抱長洲積塘數株栁高墻閉孤樓生當宇宙間此劣寧彼優殷勤有雙燕相語知何愁望玉笥岸轉蒼石踞長松垂青蘿政當停棹時江入栁隂多斜暉瀉列岫蕩漾萬金波倚舷一回頭暮氣忽嵯峨羣仙醒心處許我勤相過洞天無衆竹去去將如何登北山塔間驅葛陂龍急追數峰雨仙人專幽竒我亦微徑取山花帶雲香徘徊緑承宇身行元氣表心明萬里俯我今為我役出沒塵潦路仙人何超然應笑我如許何當寄此山隱几玩今古東湖别吳伯清周棲雲虞伯生諸君子炎炎白日長窅窅孤雲去身縻心久歸别至情更苦良時難驟得異縣不同聚名都親友并並翔文鴛羽處獨忽多聞至樂欣所遇析理挹清風吟詩看疏雨鳴琴挽幽聽評帖劣前武有時縱登覽江山見吞吐行襟浦草青解帶湖栁舞兹遊豈不佳歸來胡遽賦顧惟山林姿終非城市侣故園芙蓉華緑池照茅宇我懷詎能忘寧為倦羇旅長歌招隱詩諸君果何許他夜宿山郵明月照去住寄揭曼碩急程驚語離知問枉敦艮偉子諶多才涼齎每余困氷收閴浪起雪解河栁潤同行諒佳攜芳草發清瞬名都許當達一官子難遜皇鑒洞淵闕深儲暢閎論達行異窮誓恆為髙賢恨朂子振清風余今愧幽鈍聚逺樓分韻得笛字彩榜聚逺題登樓記疇昔一尊集七賢共領諸峯碧雲樹分村容嵐霏長溪色點點鴉影翻沉沉市聲寂古來多勝踐談笑不知夕欲去重倚闌寥亮滄洲笛梅一徑蒼苔深梅龍著花早初回天際春更覺江南好月色氷霜寒角聲天地老寄語宋廣平時無蘇味道題黃夀伯玉泉圖匡廬三疊竒昔蔽今乍顯美玉倘可求佳泉諒難見朝暉瓊膏煜夜彩白虹貫比德世所欽含光外非衒源往豐大川雲升澤九縣在山孰為貴出門敢云賤如何市朝人為起山林羡知非堂稿卷一
