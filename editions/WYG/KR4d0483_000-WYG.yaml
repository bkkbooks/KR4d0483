body:
  text: 知非堂稿别集類四元提要臣等謹案知非堂稿六卷元何中撰中有通鑑綱目測海三卷通書問一卷皆别著録據中自序所著尚有易類象三卷書傳補遺十卷吳才老叶韻補遺一卷六書綱領一卷補六書故三十二卷蘇丘述遊録一卷搘頤録十卷今皆未見惟此集僅存然自序稱有知非堂稿十七卷外稿十六卷顧嗣立元詩選載知非堂稿十七卷與自序合王士禎居易録作十六卷亦與自序外稿合此集止六卷似非完書然嗣立之所録與士禎之所稱者己均在此六卷之中又似無所亡佚者豈後人傳寫或合併其卷數抑或重為選録汰其繁冗故篇帙雖減而名章雋句一一具存也詩集之富唐無若白居易宋無若陸游楊萬里而珠礫並存往往使後人以多為憾是編佳製具存而蕪詞較少可謂刋糟粕而存菁華即非足本亦不必以不完為歉矣乾隆四十四年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀知非堂稿原序夫言之秩然次序條理者謂之文文無待於作也後之人口之所言雜亂無紀則必締搆於思撰造其辭而後筆之於簡牘古人雖不作文孔子嘗云辭達而已矣此固作文之大法也而奈何作者之不知此哉東漢以來氣弱體卑無復有善作者至于今殆千餘年唐宋盛時號為追蹤先漢而僅見韓栁歐陽曽王二蘇七人焉若李習之若唐子西若張文潜非不逰韓蘇之門而竟未與韓蘇合一也兹事豈可易視哉表弟何中太虚少負逸才弱冠已能詩而亦用意於文至順二年春予臥病頋予於病中授以大集予讀之盖優優升七子之堂矣予不勝其喜非私喜也喜斯學之不孤也斯學也雖非儒者之本務而其格力之高下實氣運之盛衰闗係又豈小小哉病餘倦於書然喜之不極為書其後而還其稿前翰林學士資善大夫知制誥同修國史草廬吳澂伯清序知非堂稿自序臨川何中能言知讀書咸淳壬申甫髫隨父仕廣東曲江乙亥出嶺至元丙子僑居寧都隱避浮寄者三年已夘始從師問學師宋進士張叔方朱光甫羅士鼎於前輩屢嘗親劉㑹孟識謝君直姚端夫王肯堂交甘詠之程鉅夫李士𢎞元復初掲徯斯全止所當世知名士多友善於吳伯清為姻兄弟云至大戊申如析津皇慶癸丑適東甌所著易類象二卷書傳補通十卷通鑑綱目測海三卷通書問一卷吳才老叶韻補疑一卷六書綱領一卷補六書故三十二卷蘇丘述逰録一卷搘頤録十卷知非堂稿六卷知非外稿十六卷延祐庚申夏六月朔臨川何中太虚自序
