  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0483_WYG_006-1a, image: WYG1205/WYG1205-0585a.png}
body:
  text: 知非堂稿卷六元何中撰七言絶句穆山寒雲十里踏沙堤斷雁數聲心自悲不見悠悠官道上前人已逺後人遲舟夜拓去篷窻月滿襟蕭蕭驚雁墮哀音不知天意何倉卒數疊寒雲萬里隂訪曽士益釀雪不成雲未闌樓危笛裂雁聲殘江南江北梅花夢夢入空山共苦寒海棠㝠鴻銜子錦川來嫋嫋柔紅花數開花睡未醒春未透半空飛雨暗蒼苔西嶼野色山光儘可詩倦來把定釣魚磯晉成東去唐成晚花信無風春自歸即事落紅瑟瑟叠蒼苔古徑無人獨到來野蝶山蜂渾不見春風更許草花開江行悠悠行客漸黄昏隔浦人家已掩門誰與飛漚逰海上亂鴉無數下西村雪天風摇動玉京移九野蒼茫一望時老樹細觀猶似舊好山何處不堪疑其二我疑𤣥帝巧鋪張萬落千村入混茫但得減租寛物役何須如許壓遺蝗其三前鋒飛霰決雲馳後拒獰飈裂地吹江上梅羞顔掩玉崖邊松老鬢成絲其四汲竇烹茶火未殘敲詩刻燭夜將闌征鞍擾擾江南北似是梅花怨苦寒清明墟落無烟草樹昬一樽蕭索酹殘春吳陵晉廟凄風雨那怪荒阡少祭人夕陽夕陽盡入笛聲中兩岸樵漁一水通楊栁已疎楓漸落黄花渾未識秋風昨夜池蛙鼓吹已成癡穴蟻侯王更自迷昨夜孤窻何所似三更風雨五更雞落葉當春已惜片花飛緑葉成隂事轉非啼鳥唤驚人夢覺秋風零落葉全稀獨來黄花自是最難開待得開時我獨來籬落不知天地晚何人却採落英囬絶句山似芙蓉向晚開水如羅帶束林迴世間只有閒鷗鷺立盡寒空待我來楊花萬㸃楊花倚石開千層椶葉下山來諸峰窅窕深春緑獨自衝烟看幾囬次史葯房池上即事韻萬蕊蜚香百草芽簾旌不動栁隂斜幽禽還識欄邊客曽立東風仗外花夏日偶成香透池荷入户生静如老宿不看經一林深緑清風度遞出𤣥蟬長短聲登高數峰高聳萬峰低看到斜陽意欲迷一朶碧雲深淺碧殷勤只在數峰西隨興三首路轉林深香未窮林光盡處麥光通長安花落朝三殿曽有桑麻萬世功其二紅雨絲絲緑漸深萬年芳樹轉春隂畫梁幽谷誰輕重鶯燕闕春覺闕心其三闕空香静牡丹寒逺笛聲沉恨未殘寂寞繁華今古共一溪晴雨倚欄杆對櫻桃淡淡春烟淡淡風兩村桑柘翠相通東皇太一功成去熟徧櫻桃一樹紅雨行手決飛雲未易排幸逢佳樹不相猜數聲急櫓隔林去一陣歸鴻衝雨來秋原稻花香裏聴潺湲路入高原犢草閒生長太平無所用且隨殘照看秋山小齋獨坐老蘇朱墨十分工應笑林間逺世蹤翠樹𤣥蝉秋滿院更添何處一聲鐘初春年華來去野梅識春意淺深沙栁知偶到前村閒指㸃數峰殘雪淡晴時雨中遣興萬壑千巖夢寂寥飛淙落澗夜蕭蕭覺來忽聴兒童說昨日榕隂有石橋二來時榴樹綘雲遮今見盃盂墜顆斜莫待鏡中頭盡白閒情都付粤東花三雙魚容易託飛郵潮水無情上劍州占得千峯深處住門前溪水更西流聴雨山家秖隔面前山慣得書題不徃還秋色定隨連夜雨幽花細草滿西灣題雲煙疊嶂圖古木蒼蒼定有村千峰猶帶雨餘雲逢人却問橋東事林外飛流壯幾分題錢舜舉小景緑樹深深波渺渺書樓高映碧峰寒柴門掃就無人到未必能令闕看題觀瀾圖三間茒屋下書帷喬木森森密䕃垂萬壑千岩人不到静看山下出泉時題曽祖說詩集貫珠編玉粲寒牕紅燭摇花省漏長斷雁繞雲飛不下數聲瑤瑟起瀟湘豐城道中一洲烟氣一洲寒沙尾飛鷗勝我閒前日西山今不見雲來猶自想西山雪中戯成我是天仙第一流水晶帆跨玉龍遊千岩萬壑氷壺裏神觀清明得自由題瀟湘秋色圖瑶瑟無聲水自流黄蘆黄葉滿汀洲蘋花欲采無尋處一片閒情萬古愁穆山一陂凝緑倒垂天直上層峯積翠邊迢遞烟雲三百曲水聲徐出石門前又老木懸崖徑最峭山風刺刺水蕭蕭縁源不記梅栽處忽遇㣲風在石橋客來緑樹隂邊翡翠飛笑吟佳客坐書帷井華汲就茶烟發看罷數峯秋雨時維揚道中淮天如水水如秋葉葉漁郎下釣舟北畔荷花南畔栁殷勤送我到揚州二香霏滿棹渡長溝濃著秋光淺著愁日暮女郎清唱發鴛鴦斜拂栁邊洲三聚栁成村水一灣闕鷗分趂棹歌還今宵繫䌫知何處好在紅菱紫蓼間無題玉雪容華翡翠衣㡌青貼領髪雲飛共郎急趂斜陽渡不惜黄沙走馬歸二慣得驕驄識妾家佛桑庭院繡簾斜鏤銀合子檳榔片戯噴猩紅散唾花三天妃廟前斜日時女郎歌斷綵鴛飛林花滿地𤓰船散城裏官人排馬歸四烏石山前颭酒旗醉來健倒日平西蔡家石刻端明字賣與他人作墓題五丞相堂前草暗堦尚書池上樹生苔子魚風起秋無路記得誰家甲第開題陳舜卿龍卷舜卿名俞丙辰進士草亭其自號妙舞當年色藝精吳宫晏罷夢難醒早知畫得龍千卷留與閒人記草亭送人逰玉笥山咫尺簫仙玉笥家水香二十四溪霞攜書便欲隨君去長向雲間掃落花䢴溝衰栁殘荷併惨然青山隔岸㺯嬋娟多情惟有䢴溝水長送江南過客船見梅花氷合金河雪暗殘内家難覔一枝寒秖應獨結梅花伴水逺山長信意看㣲雨一天㣲雨溼芳塵紅緑相依幾聚春家在海棠花下住傷心長是未歸人放船晚色重重放客舟輕風吹漾落潮流林巒盡異來時路知是明朝到福州莆陽歌兩兩筠籃溼暖烟窄衫短鬢裊行肩到門迎著郎來早持向街頭賣海鮮黄沙道中深淺寒烟曲塢間杉皮小屋遶幽潺紫苔青石梅花路隨處閒看雪後山山行隨興暖風吹雨溼平沙逺色疑青草欲芽誰是多情能愛我野梅一路臈前花又金石臺前鴉亂飛空濛山影出隂霏野塘水活栁生眼茅舎聚人迎婦歸清江道間阻雨峰影㣲昏樹影明人烟深淺水縱横前時逢雪今逢雨長在江南畫裏行凌雲山房雪中山寺孤鐘撼曉殘西窻窻外玉珊珊開門㤀却階前石驚問何人疊雪山又萬頃寒輝貫碧霄一林清響落金飈梅花開就歸時路莫待前山雪盡消新淦藍步溪隂靄通烟翠作霏春風入雨暖成泥女郎挑菜不知溼調笑相攜過水西無題喜遇佳期未有期魯陽不見下舂時春風好長江南樹長與閒人惜子規西風苦蓼花開錦換洲野夫容發艶通流東風即是西風骨莫向西風誤作愁喜雨花事安排趂好晴沙膏新換牡丹坪明年何處看花客一夜東窻喜雨聲題墨菊橘枳蘭芽玉易瑕商山一出便㤀家幾囬惆悵梅花别併有緇塵到菊花見楝花開緑光深淺上窻紗矻矻讐書髮已華年譜他時誰記取一株紅楝兩年花酬友人見訪不遇荷笠深山採藥囬荆扉石徑損秋苔花邊稚子相迎說昨日有人騎馬來題趙太祖太宗蹴踘圖共戲笙歌聒處春他時甘作墜雲身一九明月樓頭闕山人解誤人荷花曲沼芙蓉暎竹嘉緑紅相倚擁雲霞生來不得東風力終作薰風第一花立春近夜雨達旦梅花天氣夜尤清清得還鄉夢不成知事新春隨雨到四牕飛雨作春聲除夜自封溪歸高淵栁辭殘臈蕋初垂麥長平沙緑轉肥寒日漸温風漸軟隨山隨水看梅歸二歸人元自少歸情不計程期且緩行沙步酒旂村鼓亂連林鳥雀盡懽聲三鴛鴦翻雨戲迴溪溪路迢遥濕翠圍隔竹杏花紅萬㸃何因知我此時歸四鬢鴉橋北試春衣濃粉深脂濶畫眉板閣磚爐相聚處欣然說著看燈時五蟻旋西磵轉東源竹掩松遮又幾村家在江南幽絶處千峰帶雪繞柴門豫章登舟作城南無樹識神仙閒往閒來四十年西岸青山東岸塔為誰相對老秋烟象牙潭水禽兩兩樹三三近浦遥峰隔嫩嵐新換一天秋色别短篷又過象牙潭絶句芝谷山前日荷鋤柴門生事轉蕭疎放翁老去真堪笑猶向人前說讀書春風杏花紅度海棠紅緑展平沙拂嫩茸共愛春風猶是舊誰知不是舊春風自笑世情多識事多諳長對雲山共笑談煮石采芝隨意足慿君莫唱望江南豐城道中江村南北笑聲頻紅燭花時次第新春水漸生桃葉渡小舟時載嫁歸人二曲江灣處小瀟湘磯栁疎垂雁落行暫繫一篷寒緑裏數聲清響夜鳴榔知非堂稿卷六
