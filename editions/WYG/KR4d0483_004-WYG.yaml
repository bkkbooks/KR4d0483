body:
  text: 知非堂稿卷四元何中撰七言古詩與甘東溪風吹嶽倒黄河傾漢家老死飛將軍洛陽宫門銅駝哭哭聲遏盡南征雲忽忽五馬歸何處吳山楚水相吞吐英雄豪傑笑殺人新亭揮淚中流語佳人别去吳王臺空餘舊曲令人哀徃時射䇿談江北夷甫諸人安在哉春風吹老千桃李短笛凄絃風雨裏荷衣蕙帶漫逍遥杜若洲邊雁聲起君不學少年快馬曹景宗步逐狡兎彎强弓君不能少㳺欵段居鄉曲得稱善人闕何悲辛彊把哀吟感鬼神高堂夢斷行雲杳雙蛾翠黛為誰春華陽雪落江南暮江花江草蛛闕露人生何處無知心背人鸂􅈑雙飛去為君起舞為我歌古來賢聖良蹉跎區區離合若為動羅敷陌上感慨多山中仙人最髙潔不比常人夙葷血願君舉似經畋詩今古何曽異明月經畋有山中仙人歌東溪常稱之故及漢宫春君不見漢宫六六多佳麗露花半染雲裾翠少翁招得夫人魂孤鸞夜啼月波墜趙家姊妹專風流雙蛾不識人生愁夫容並蒂欹一朶西飛青鳥徒離憂飛龍翩翩上天去雲幕椒房土花雨墮膩埋胭恨未消香魂尚寄寒莖舞人間炎日焦衆芳肯隨葵藿來傾陽柔情幽怨透地脉烟幃寂寞彊成粧誰吹舊曲縁雲切寸心婉婉應愁絶緑羅幾叠御賜衣紅綃半㸃守宫血凄兮媚臉棲餘妍遥憶羊車望幸年至今一片巫山雨化為飛烟空澘然故家陵苑孤雲外緑樹如雲草如海殷勤唯有虞美人同向墻隂弄晴靄春怨洛人傾國賞牡丹東家綉轂西家園黄鸝紫燕新得意柔雲如酥花迷魂逰人寂寂歸何處花亦年年占風雨江南却遇李龜年蘇州空感楊開府誰吹玊笛斷人腸斜橋淺淺流水香惟有千年老銅狄看盡人間幾夕陽又天女手剪五色雲鞭雷控電行青春散作江南萬錦繡燭龍眩轉空無塵燕兒眼寒心更苦吳娃情酣夢無據依然錦綉化為雲却恨風來挾雲去十二樓邊芳草多知今鸚鵡聴誰歌千金買取新豐酒地久天長奈樂何讀羅時翁燕山行稿去年送君萬里行英雄氣富乾坤貧今年君歸未㑹面燕山行卷驚倒人我從江南想江北八陵草暗孤雲白夜窻燈火讀君詩一段竒愁貫地脉燕山山水負雄竒千五百年君有期荆卿等輩了不見咄咄怪事令人悲黄河西來走東注太行山髙壓中土河山壯觀帝王州萬雉城荒土花雨宣和玊輦去無蹤蕭條艮岳摇秋風東霸城邊見銅狄廣武戰處思英雄天地空荒形勝老兒女終身不能到北征詩後斷無人騎驢獨向長安道長安道上新豐徒怪此却與南人殊天下久無快意客此客乃爾雄牙鬚即事非今亦非古牛鬼蛇神萬妖舞千里萬里種竒語要與嵩華争步武人間官不直一錢歸來添得詩一編堂上稱觴拜親壽膝下讀書㤀歲年要狂即狂已即已丈夫做事當如此何由相見共君談寄詩問訊聊復爾我今山中一處子滄洲滄洲天下士滄洲時翁自號用歐陽文忠公神清洞韵題羅士鼎所藏米元暉神清洞圖潁陽之山翠烟深仙人不見勞我心藂峰峩峩照空廓白雲欲飛石欲落此中不著人間客採藥歸來花滿石想當飛舄墮層崖数聲清嘯驚瑤臺羣山蒼蒼今在眼舉手招之殊未來潁陽之山夜鶴飛仙人不見歸何時神清之洞有幽客應向洞中煮白石洞前岩下仙家春幾片落花雜飛溜髙下樓臺縹緲霞緑樹不老青山夀王生邢子意殊勤恨我隔此浮空塵安得碧雲千萬叠棲此人間謫墮身又元暉昔作西江客夜飛墨花曉無跡春風留此二百年幸是山中至人識有千黄金雙白璧鵝溪白蠒纔數尺潁陽山髙風露寒幾處高堂掛生色題曽子文靖節詩注一馬東浮南北分吳宫桃李春正喧英雄慷慨有餘恨誓江直欲清中原五山忽拔神仙宅長風吹轉銅駝陌乾坤千古此哀新琵琶有聲言不得當時縈損君黛眉意欲恤緯終投機山能平地心非石賔王從此自緇衣夜看五栁先生傳長恨斯人不吾見難將逆裕逭春秋此身不是甘貧賤十載東籬一世豪君今躡此清風高零陵哀憤從誰語心不與契安和陶琹本無聲亦無趣悠然㤀返中情寓一編箋出許多愁奈何此世非劉裕杜陵正值落花天江南又見李龜年傷君曲調空遼絶吞聲獨咽山中泉中秋走筆忽忽不知秋已中起來望盡江之東天風吹上一片月萬古有盡明無窮自歌自酌自起舞失喜墮在明光宫須臾見雲不見月九州之外俱昬濛我狂絶呌天何聰乾坤如此寧怱怱江流㝠㝠上有楓雲邊又呌南蜚鴻有酒且醉無酒可有月不與無月同丈夫意氣見石裂直欲掃裂雲皆空低徊一笑良自悟事與變㑹誰其逢仰看雲月勿復道西風落山人睡覺塞野縱目讀書萬卷不經濟懶境最佳工坐睡手持緑玊信步行穿破麥花到松際縈囬空谷含幽光隱映深松發清吹北風掠野牧者誰牛影參差霜草悴一牛閒卧意方安童子何知鞭已至囬頭一望近天南髙下千峰洒濃翠近村逺浦合寒霏落木平林歸暮氣世工善畵貴逼真悠悠真境誰能契古來文章亦如此真處看來有深味競為幻語欲幻人敢向人前辨醒醉歸來歸來勿為留幸有禽聲媵魚沸道傍湖中小白蓮花清香可愛野人名曰玊蓮浮葉團團缺一角開花皎皎玊新琢洛神湘妃不足倫太白醉魂寄蕭索過客誰能知妙香春風竒禀勞隂陽可憐有此白玊質謫在江南荇藻行古來名花傾城國緑珠樓下沉香北幽然更用世人看摇蕩平湖水天色高囦四時歌春風東來汎幽谷出門一笑人間緑新雨池塘栁帶鶯嫩雲洲渚沙眠犢一蓑一笠東西村天高地下斯人存歸來醒醉聊隨意翠樹無言花滿門又陽烏炎炎焦九土老農吁嗟氣如縷山中神化出移時一片閒雲半溪雨誰家金谷有涼臺葵扇桃笙争自媒清風却在長松下不須用智不須才又楊栁磯頭天萬里長笛一聲風不起翠灑千峰日映烟清涵雙澗霞通水季鷹底事却思歸豈是鱸魚輕别離晚知尤悔又何益灣頭釣竿君好持又寒鴉萬㸃落葉赤山風蕭蕭野日白池上梅花俱有情林間茅舎元無客人言梅花知嵗寒花亦偶然氷雪間向來羣芳今欲盡蘭芽已動春將還宿紫𤣥洞天閒招雙白鶴駕我吹玊笙去謁紫𤣥君飛飛入青㝠石古天風吹不剥銀漢殘波崖畔落萬年碧樹春長花花間弭節聴天樂戲拈北斗柄細酌瑶露團八面烟霞滄海曙四垂星月碧天寒珊珊曉珮人間去萬頃飛塵入揮麈徜徉九縣賣金丹邂逅千秋人未度羅士從真一酒歌大槽壓白流醴泉小槽滴紅血啼鵑多誇妙味觴玳筵詎知毒留不可湔工調錦瑟思華年薰風阜民纔五絃法吏㢘潔終申韓闗雎麟趾意莫傳岷峨之山來坡仙鞭鸞駕鳳嬉人寰黼黻王度勲柱天餘事與酒究本源坡仙仙去今幾年真一秘法空遺編余頑居士何曽頑乾坤萬事俱精妍㝠參真一㤀蹄筌髙闕麥塵霏玊鮮淵明秫顆珠明蠲幽澗汲月分清漣水火交濟隂陽全三投釀令味温妍甘芳周徹客流涎杜儀足蹈舞九原揚箴劉頌俱浪言皂𨽻八仙奴七賢持澆朽骨應汙顔東風吹緑花盈川泠泠鸎吭韻清圓此時一酌神超然至和氣象身周旋頓挽淳風追古先如此無懷大庭前囬視鍥薄吁可憐若真若一物何難甘為弊法相牽纒治道貴簡不貴煩為君長歌真一篇墨梅咄咄唶唶夥竒哉維摩引臂何方來忽而𤣥雲飛出老龍黒黯之鱗甲乃是皴皴不剥之枯苔三椏兩杈鐡作髯十㸃五㸃小者如珠大者如雪踈闕驚失正視似龍非龍徐看畫得蜀苑吳仙梅梅花江南闕童亦指㸃毫髮不相似抨彈舌閃閃燕山飛雪飛無時闕貴梅一枝安得韈材二百五十疋煩君多闕短幅闕火室贈陳仲實春風吹空雨溟溟闕繞几簾不捲燕子闕濕衣花草生客來闕數口亹亹撑眼直闕睨傍無人醒我蕭條闕不齊須臾反覆渠得知馬前之奴忽極品闕貧中富賤中貧金谷楼下花滿園不知仲蔚闕印堆床十九枚不知敗絮牛衣那得是子陳還是闕車如流水馬如龍相逢好為細説少年行寄題疎山寺半閒禪房往時㳂泝旴毋川李花隂隂曽繫船丰茸沙草取幽徑扣闗一禮白雲禪千柱空廊絶人跡蒼苔亂㸃蜚紅妍松香四襲翠滴雨江影半侵明暎烟鸛鶴流聲出嵒谷輕霏忽散風鏘然長哦欲寫不能就每寄清夢時周旋秋風吹空客如仙名山有記時相傳廼知曇花解重現彈指一瞬五百年經閣香臺雪幾春戲成小果留人天先師吾鄉白雲寺卓錫尚令題榜鮮半閒之半可著我呼童亟辦青行纒身前舊境餘一念定許鄰舎香茅編别高申伯江南浩蕩春風滑信意南逰可竒絶神光直射瘴雲開陸賈先聲到南粤南粤堠子一千六百里春風却在梅闗裏闗頭飲罷卓錫泉前迎無限佳山水最好望韶亭上看三十六峰太古之色拂天半恍若后䕫騎鳳從天來帶得虞庭九奏韶音囬此時彷彿聞之應思虞舜不忍去唯有山風海月相追陪舜峰之下韶陽廟忮心餒魂何足弔盧能逺矣莫問曹溪禪湞陽峽裏不必聴妖猿直下廣州城中去城中公卿多自賢醫官酒庫亦是官善事使長官無難此心不與物俱轉三年偃息人已安著就新書不妨似陸賈若論功名正恐陸賈出君下林間荔子海中魚瓦甌酒醒日日沽千嵗之棗安得長相寄人來時寄廣州書送皮徳昭之官武林羨子才如渥洼馬萬騎嘶風俱在下霜蹄如電不足飛天上良星愁空靶如何不歸十二閑逺放江南沙草間一朝馳入東吴去去看錦繡舊江山故宫土花無㸃碧騁懷流水誰移得萬古乾坤萬古空英雄無淚可輕滴囬首一百六十年閒將議論當籌邊諸公何恃恃江水江水解容偷渡船璧月無情瓊樹老遺恨滿腔不能道留連一曲後庭花待得楊堅何草草海門自闢潮自來禮華樂葉俱寒灰東風漸搖堤畔栁臈雪欲挹湖邊梅平生欠作經行處羨子東行問征路一官何用計崇卑好聽吳儂詫新句嗟哉與子如有縁相逢相别不期然龍杖堪騎定相訪馬塍花下酒如川郝思温大字歌號東山雪菴髙弟東山手提雪菴筆筆中出此萬鈞力重如岱岳鎮坤維竒如古鼎躍泗側㸃如滄海之碣石直如叅天之古栢曲如老龍恣盤挐横如方城立鉄壁快如大澤斬蛇劒妖䕫幻魈俱辟易巨靈引指太華擘三千獅子座舉臂可移得偶然揮毫闕世間世間壯士不能擲瘞鶴銘摩崖碑後來者誰誰継之我嘗見龍溪之字大如箕五百年間無此竒雪庵老東山子優鉢曇花重現世崑崙以為筆東溟以為硯青天以為紙為我寫太平兩大字持獻天皇九九八十一萬嵗我歌爾字我老矣題江南烟雨騎驢圖風發發雨瀟瀟渡船未度山相招騎驢不知前路遥前路遥抵何處南山之南且稳住莫向長安街上去京尹今無韓吏部送朱縣尉之官贑城秋風吹船上重灘前茅未到聲先傳官能捕賊如捕䑕直擣狡穴不一全上功得賞來此郡威慴獷悍皆服田城南城北雨新足香稻滿野歌盈川衙空吏瘠弓力廢尋常舊業開芸編欝孤臺高俯流水崆峒山碧迎寒烟張梨如盂柿勝蜜美酒可飲不直錢茶山詩派有續者随時倡和多新篇聖朝無煩上封事第一莫學吳門仙方今儒臣易進用九遷何用終三年菊歌山水之村沙路乾風清日美情閒閒松林公子好事者千株異菊培庭間素娥天孫娱清夜從以羣仙彩鸞跨盡収四天五色雲巧粧絶艶鬭新雅紅玊琢成深淺紅赤金抽瓣金瓏􅋛推氷妙手簇氷蘤間以孔雀堆紫茸洛陽牡丹杜家譜西園芍藥何足数造化工多良獨難逢花不賞將何歡君當歌我當舞花亦欣欣欲相語不須定限一日三百杯不須腰鼔百面如春雷但願樽中長不竭諸公長在花長開世換花花換世移根改色年年異一畨花様一畨竒看到伐毛洗髓幾畨時送程學士洞庭之水銀河通手提白筆行清風歸來緑野按幽事青山低昻馬影中時從賔客娱泉石不省麒麟誰第一中使傳宣下九天闗河秋光照飛驛彤庭引見宫雲開問卿安在今肯來闕暎天顔喜百辟在列俱首囬皇元經制宰九有曽侍先皇討論久登庸耆俊徵舊聞宗社靈長自天祐中書堂中庶務清四方萬姓歌升平應無闕事可商畧定見房杜藏功能我從諸生立門下别公敢把深衷寫子房歸計未足高伊吕元非退身者力竭忠嘉荅主知闕此東南誰當續王庭石介頌眎千萬祀無窮期魯港行闕西來天塹長大波如山險莫當黄蘆未花秋黍熟欲弔闕空蒼茫十六年間老師相格天勲業伊周上儀真使容闕襄陽將軍儘降將西園價積郿塢金伴食光禹趨雄禁法宫穆清坐高拱赤舄雍容衆口瘖葛嶺祥烟籠甲第吳娃理曲争新媚珊瑚枝邊酒影春水晶簾外花香醉主君千年萬年計甲光如水邊風寒虚傳竒士畫三䇿臨危諱病醫良難古來何限韓擒虎天馬如神解飛渡出師拜表真孔明不計闕九節度半閒堂前杳歸塗閤中諸客今何如前時晉公魏公語今日驩兠苗鯀書殘月無情上陽曉木綿破闕閩山道潮落潮生人不歸陌上花開幾番好采石驚濤萬里來無極虞公中興偶成績百年俯仰感慨多事不天假終無益君不見李太白高才絶世何不直但令供奉行醉墨倉卒纔為氷玊容萬里漂流夜郎謫人生有知當自適飛絮浮雲本無碍青山丘墓何足惜向來金鑾殿日落狐鳴秋草碧車碌碌車碌碌車上行人雪中宿三更驅驢聲陸續頓撼肝腸眩心目霜稜飛刀風激鏃荒郵無烟抱空腹橐駝不収馬成簇暗裏低心避羣牧望斷海光上東旭木末天低星煜煜黄河道黄河道漠漠黄沙覆枯草依然南北兩空堤堤上畊人長桑棗人心百計當若為古來河水今南移平原縣前好沽酒車夫鞭驢莫囬首龍灣阻風次日舟人必行解舟風囬喜賦東風吹船行西風留船住蓬鬆黄頭郎作底使風去蘆篷兩扇當江開船船相趂風初囬龍淵烟氣隔洲失宣化山光隨棹來潮頭又上推船走一時便過新河口兩人勝負篷底棋船行遲速人不知黄頭郎稳扶柁信風宿大信肉色花枝紅采石酒波春水緑長風沙長風沙酒旗斜風沙有情留郎住勸郎莫向前江去前江去轉風波牛渚圻邊須過得皇天蕩裏奈郎何郎船但繫門前栁唱曲好歌勸郎酒與郎不是平生親憐郎却願郎長久郎今必去當何為教郎解有思人時山碅碅山碅碅石确确一灘翻下一灘惡青衫黄帽扶招竿銛鋒如㦸波心攅打槳失手能盪過扶竿失眼船隨破三山城中女如花髙樓酒賤多魚鰕荔支林中尋屋住上灘難轉莫歸去冲虚宫景真堂怡山東麓堂静深欲尋真景真難尋華鐘時發貞明韵王審知時秀木遞懸天監隂王伯梁天監中飛昇天風飂飂吹余髮戲綰幽藤作條脱騎鳳簫驚烏石雲降龍劒照古山月丹爐藥竈長周旋六時采擷三芝鮮蓬萊書札失幽約幾度歸潮深碧烟了娘囝了娘囝西禪寺裏粥鼔鳴殿前殿後荔枝密葉落當掃草久生衣裙潔峭苕鉏輕戯將苔石門敲鏗廊隂同伴笑相謔話字難通知有情紺園花香日易晚行童遲打昏鐘聲古秋夜長晴雨壁帶懸素琹衝牙起瑤林月寒文甃百蟲語簾外桂花香雪深綉茵暗輟雙龍枕紋笥密収團鳳錦西隣少婦笑齊眉寳帳芙蓉攜醉歸獨自佳期長是誤璿霜欲下雁驚飛又雪浪流碧虚雨花散前除西風紅葉石欄曲盡并寒聲歸綺疏囬文讀罷雙蛾斂城上啼烏稀漏㸃東家嬌小乍迎郎沉水銀篝殘晚粧燈裏鏡臺閒自照紅顔相似夜偏長題盧鴻十志圖崖欲脱峯欲飛水灑灑烟熹熹石間老樹不老色翳蘿懸隂石入黒調琹未了趣觀泉十處竒蹤日相迫紫虚萬里丹霞開直上倒景之髙臺佳雲好花滿嵩少仙友為我今歸來莫嫌登山脚曽踏東都路姚崇宋璟可人故不然豈肯容易出山去擬峴臺擬峴臺山如盃樹如苔臺前東風花亂開流雲藏雨花間來花根得雨新緑催花枝隨雨成香泥神工鞭䇿不停手七尺容形争好醜桐林領頭木香酒百錢一盞當酤否雪中度崇仁望仙峰㳺樂之溪清可㳂天風剡剡山盤盤愈行愈深愈幽邃疑有仙者棲神丹樛木怪藤鳥鳴荅緑潭青壁龍嬉蟠裵徊賞愛不能已步步駐目搖荒寒寒雲平凝帟帷妥急霰亂下珠璣完忽而兩崖蒼蒼散花雪板橋石路浮􅀢乾交迎密撲迷欲眩怯下疑高行自難凭澗茅房所居雅叩門烟火相依安澄渟夜氣造寧極嬰冒曉凍追殊觀忍觸瓏􅋛縱健踏喜聆環朗藏鳴湍垂㽔不動偃杉竹懸柱偶脱争嵓巒前源未窮取危磴直上百折陵㠝岏新爪痕痕過飢虎高翰葉葉逰飛鸞俄然獨立倚霄漢波濤翻海鎔銀寛雙瞳四徹洞萬境肯與塵界循憂端蹇余看雪知幾處何如此時望仙峰上看仙之人兮來不來浩浩元氣與我同朝餐題五馬獵歸圖秋野肅肅秋草萋萋天空雁度呼鷹時一馬前行四馬隨前者囬頋相指揮最後兩人俱下馬一人拱手俯聴之一人挐麞毛色肥角弓在弢箭在房人馬意態何遲遲知從底處射獵歸莫是營州少年并州兒閒中貌此知為誰筆力精勁妙莫窺我疑此畫有似汲塚古書出蠧簡殘逸有缺遺不須完足自可寳古人日逺何由追嗚呼古人日逺何由追黄氏南園歌南園花南園花白於雪紅於霞深處定有仙人家花隂亂駐七香車山香儘舞花不老花艶直上搖金鴉瓊膏一吸香入骨醉呵金鴉不令斜南園竹南園竹寒於氷緑於玉割得何天土一丘炎官雖炎誰敢酷天山太古雪皎皎蓬萊絶境風蕭蕭白鶴翻空啼一聲下占清隂對棋局君不見古南園錦茵紅皺琵琶弦珊瑚碧樹沉水烟嘉賔列坐鼓咽咽白石詩句吟成編放翁記文筆如椽挾䇿博塞若為賢撫掌一笑睨青天不如花竹之間汲清泉且取粟粒香芽煎題五公寺壁畫古栢陂陀堆豗挺雙栢槎牙直上不可計尋尺元氣所融結通身骨力醜怪形狀古黯色作柱擎天等閒事世間萬木俱難敵栢根水流滔滔鼓舞風雷吞吐日月闕惟有雙栢牢萬牛囬首参天高看得孔明事業如鴻毛由寳塘舟行至臨汝盧鴻十志看不足愛雪貪行雪相逐晴風吹散圮山寒三十六陂水初緑黄洲拏得罩篷船松筠繚遶烟成淵波聲叠下灘聲惡鮑照却歌行路難山中樂效歐陽公東方風囬春山道趂暖行歌霽華早溪源露歇逢藥苖石徑烟輕掇芝草紅英灑地燕將乳緑樹添隂鶯未老入笿魚鰕朝赴饌傾筐笋蕨夕供芼山中之樂誰得知我獨知之來何為水竹沙頭閒檢校村村簫鼓太平時又堤栁緑搖新罨畫石榴紅摺嬌裙衩蓮蕩風閒翡翠敧菱塘雨定鴛鴦下溪女浣紗朝出村行官飲水暮歸舎瓦瓶手挈隔年醅石下坐圍明月夜山中之樂誰得知我獨知之來何為空裡烏蟾飛影過桑麻課效勝書帷又空山一夜生新雨涼起賞心千萬緒扇團自守不依人桐葉知幾尋脱路隔隴笑談雜樵牧臨流賔從惟鷗鷺懸庖蘆菔美勝酥精淅新秔香滿户山中之樂誰得知我獨知之來何為青林紅樹人􅃄溼護得金橙密處垂又千花重作陽春節野杏山桃隨處發莫思前度看花誰已見新墳芳草歇穆山山下數灣月華山山崖千丈雪幽人獨在雪月中要與梅花成四絶山中之樂誰得知我獨知之來何為除却山家新臘醖世間無事可相宜龍霧洲時大王有南行者龍霧洲水油油中有驛馳南越舟庾嶺瘴天雲不収直到海邊天盡頭天盡頭海茫茫金珠璀粲平斗量鴻毛性命此難㤀檻車何事招巫陽不如囬雁峰前鴈鴈門舊侣年年見陵山館辭陵山兮蒼蒼仙之人兮何鄉邅余陟兮巘嵼援碧藟兮廻以逺草髴髴兮華繽繽頥下方兮凝翠氛空館兮延佇待來不來兮沓空碧七鶴駕兮曷追渺余懷兮悱惻煜三秀兮㓗餐羌静貯兮陵山挹太清兮撫𤣥極聊逍遙兮永終日知非堂稿卷四
