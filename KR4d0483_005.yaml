body:
  text: 知非堂稿卷五元何中撰七言律詩與胡山村九萬風高力控摶偶然倦翼墮塵寰間聞說到乾坤外知已誰當伯仲間何地可堪容一橘亂雲相隔失三山方來亦有無窮在未必先生可得閒又平生再拜一何難昉得陪從杖屨歡大節熟聞諸父語高風還許後生看茶邊道義松風晝酒外興亡竹雨寒别去幾時能聽法秋深桂馥重憑欄送李仲章逺逰風笛無聲笑指空出門誰礙更求通一帆千里客何逺王氣雄圖江自東亦壁驚烏飛夜月衡陽看雁落秋風人間興廢不須問詩在江潭栁影中秋懷萬壑東歸晝夜流人間自是本無愁不悲白骨塌秋井尚恨華屋歸山丘此事直須一杯酒只今何用萬里侯明朝且可尋黃獨荷鍤徑往西山秋又采采蘋花可佩香依依橘柚未全黃人行塞北非征戍雁過江南有稻梁短笛疏鐘來别浦亂鴉飛鶩共斜陽西風擾擾知何似看見黃花滿地霜嵗菊黃玉為裝好自修天寒身被翠雲裘直於歲暮標明節那向人間立晚秋湘澤忠臣終戀楚柴桑處士不歸劉漫將二老閒題品寒照疏籬一片愁除夜身外須知總是空書生何處覔窮通自緣一嵗今宵盡獨坐殘更數刻中學有淺深心勿畫詩無今古句難工不知春到池塘未一夜簷間花信風閲穆陵丙辰御賜進士詩後代忠臣擢丙辰穆陵魂斷北征人長江浩浩傾吳越九野荒荒嘯鬼神鵑血縱乾難返蜀烏頭未改竟留秦琵琶絶域千年恨青冢黃雲不識春大水漠漠隂寒寂寂秋濁波如屋蔽空浮聚灰莫試媧皇手銜石虛存精衛謀逝矣棟梁歸大壑纍然盆盎塞中流鷓鴣聲苦行人斷且向江頭具小舟雨中雨滿寒空風滿林閉門十日自悲吟不知衮從誰語尚許傾陽見寸心書史軒窗雲氣潤蕙蘭蹊徑蘚花深好風為我吹晴未欲釣清溪坐栁隂又炎夏如秋氣已還老天竒變亦多端山橫北牖隂雲合人對南山暮雨寒江海窮居無米易古今邉意得詩難嵒花落盡幽禽語坐看千林擁翠瀾八月二十八日黃竹哀歌世偶傳佳期應待後千年曲江宫外看蒲栁凝碧池邉聽管弦古往今來人化鶴天長地久帝為鵑蓬萊水淺應聞似徐福歸舟已失仙夜立冥冥無復辨秋毫天映諸峰湧翠濤萬里明河流眼去三更獨雁倚風髙南鄰絺綌秋難貸隔舍歌呼夜更豪只有殷勤木上坐共聽枯葉響蕭騷臨川道中路隨一水曳長烟秋入重雲擁亂山過眼向來華屋處寸心不挽盛時還紛紛世故行人亂漠漠林霏白鷺閒忽遇長空飛驟雨春泉一派落松間穆山書事蜾蟲三百有六十其長相殘更斷魂細與漁樵商世事獨尋闕梵到松根蟬鳴晚日濃時樹鴉落秋烟淡處村難覔飛車逰海外直隨藜杖信乾坤晚步歡適常看好景稠悲吟偏覺滿空愁碧雲忽作紅霞合翠靄俄成紫氣浮笳緊山城鴉翅亂人歸江路馬聲遒老天遺我多竒變著在江南澤國秋曉晴雨意將闌天自休細穿詰曲聽鈎輈千山欲曙微霞吐萬木含春溼翠浮孤塔逺知城尚近空江猶似古來流繞汀花落白於雪掠地風來嚴似秋孺子亭先生不是早知機所恨諸賢喜有為共立名稱空自異竟成朋黨最堪悲當時僅許陳蕃識此意只應梅福知亦見祠邉丞相宅滿墻幽草緑參差登滕王閣洪崖山前樹歷歷石頭渡上烟溟溟龍分片雨過秋水鷗倚西風窺斷城吏部文章餘簡册前王名姓老圖經登臨己費三十載草草忽令詩句成次韵彭希爽吳景傳約逰穆山穆山秖在白雲隈擘石為門任去來兩澗寒聲通法席數峰秋影上香臺林深僧梵含風逺嶺隔山樵戴月回此地能令高興到中秋又近桂方開興化軍冲虛宫贈陳虛一尊師兀兀山林棲遁身洞天深處振行塵客如种放豈樵者師似彌明非世人丹水汲餘山月淡異書評就海花新他時說看逢闕事皇慶行天第二春舟中逺送孤帆波渺渺深籠寒靄樹稀稀象牙潭上風初急龍霧洲前雪亂飛山掩孤鐘分響到沙盟叢雁逐行歸雕房熾炭行時令何那癡漁擁斷磯黃氏石闌此地何年石作闌石稜不共蘚花刓四時勝日圍芳草一塢春風護牡丹洛社賞心遺記在善和先志舊書完明年一鶚清秋上文石斑髙萬目看諭仲本詩集鮫室成綃别是機向人定價每疑非寒通海底珊瑚樹秋漾天邊寶劒輝虎瑟含風蒼洞逺鸞笙戴月碧雲稀幾回剪盡西窗燭又聽山鐘數杵飛次雪溪上人秋興韵靈峰寺裏講時茶啜處銅爐一篆嘉揮塵微言穿溟涬題詩險韻趂車斜風回過雁松移影烟隱寒鐘桂重花秪有新吟猶習氣自餘諸事鬢今華答清江皮季賢見寄古人千里夢相求咫尺翻增隔絶愁雲護箋題醒處墨雨深樹色緑邊樓文章正法追前哲句律新功卻俗流為問幾時談到劇壽楓南畔菊花秋送族弟元迪老去逢人怯送行弟兄分手若為情明時難便高才隱為客當令逺業成桂嶺寒烟通郢樹逍遙夜雨入彭城明朝便自堪回首不待秋風過雁聲寄詹正之幾驛相望兩鬢華書題不寄雁行斜但令天下稱知已可為江南故憶家樂毅臺空烟在樹魯連城圮雨殘花燕齊勝事多收拾定有新詩處處嘉觀除目有感寄皮德昭偶將除目到幽窗坐對撑犁事滿腔知是乘桴欲浮海如何陋巷問為邦一庭月冷驚秋照三寺鐘聲接逺撞聽罷無眠閒憶得灰心底用要心降贈直心苦口道人涼氣將深暑氣收芳華零落思悠悠道人心口如神驗我輩窮通與道侔鶴為乘軒能致妬馬因立仗却招尤世間只有閒鷗鷺野水如天得自由無題鴉尋流水繞村迷雁失寒菰落渚遲老杜舊傳餐玉法馬遷新睹采薇詩談空漸入皆空境觀物寧非閉物時閒憶年年溪上路梅花開遍向南枝舟中次涂雲章韵久矣坐忘如子微元非强學介之推良工未肯闕樗散新學何為迎躄師山路雪深聫轡穩江流風淡落船遲此時此景周旋好長遣閒中費夢思題崔伯明詩卷海底珊瑚不易收俄然在手醒雙眸媧皇煉石天無璺織女機絲月共秋一草作花生自别三年刻楮巧堪羞客窗燈影誰為伴雨響空欄徹夜流夀黃希尹壽星移次東禪近甘雨生涼晚梵宜心地平平真活佛書鄉郁郁有佳兒春濃寶樹開花處日麗丹砂擲米時知是文吳俱不老三神山碧酒盈巵送郭竹堂赴南臺聖代人英第一流霜臺粉省總優遊我知陳阮誰爭長人詫臯夔可與侔願作良臣安用激親逢治世更須憂六朝形勢江山在且與諸公共唱酬題皮季武所抄吳草廬周棲梧孫少初皮季賢四十年前閣皂碧崖聮句後皂嶺清逰記昔年彌明傑句儘難聫公如樂正超諸友我似延年咏五賢自古髙才須蓋代無前偉績定由天世間何限經綸手獨立蒼茫意不傳答諭仲本閒身未必受人羈為要攜書教阿宜素學日從前哲究此心偏與古人知由然栁下聊同俗老矣徐娘已昔時只道暮雲無用處彩霞五色照天竒答胡器之記和車斜四韵詩誰期此别許多時但逢來客長相問每向無人又入思心在不知身各老語深偏許䇿同枝空雲聚散悠悠者底用閒愁挂一絲贈丁教諭芙蓉仙客果能仙百事精通不等閒未入漢庭陳奏牘先從周制作醫官緩尋芳草多諳藥笑指遙岑便說山已得一吾人印可更求數語與誰看題陳達觀浪吟集語淺遙知人意深仰難闕俯難臨緱山駕鶴月千頃虎峽啼猿秋一襟斗極光寒天識劒閬城境絶客成琴馬蹄飛電長安近直上鼇峰一萬尋袁氏雙頭蓮芙蓉菡萏冠詩騷一萼雙花少所遭周日夷齊清並峙堯天巢許潔同高石丁可是神仙侣楚閩終為兒女曹臥雪門庭宜著此露香霞艷映蘭臯送達海提領軍山山下舊監州人物科場第一流千尺棟梁宜九室一官朱墨費三秋甘泉侍從須揚子貞觀封章缺馬周從此金門多應制新詩能寄故人不次吳草廬花晨韵我知居士病全安難敵談鋒舌本乾花外偶迎風日美人間已作畫圖看江行唱和今猶盛東見追陪意更歡吟弄迢迢歸路好廓然天宇似增寬再用韵答周昻霄布襪青鞋試步安徐披山徑野花乾可欣久别能相聚便有新詩得細看七尺形容終解老一時真契且交歡百年尚逺身長健若比朝菌嵗月寬送詹伯昌曹州迎親步往迎親此役宜五千里外快心期近曽讀律知名例早事通經識孝慈巨野天清緗帙穩長江風淡布帆遲企豫相待封溪上楓葉蘆花秋盡時由清江赤城觀至寶塔寺暮歸樟鎮自笑野人多野思並村隨處意閒閒赤城觀裏折丹桂寶塔寺前迎晚山隔水歸樵分路散衝嵐飛鳥認林還秖言十里街頭近不計黃昏便掩關酬揭曼碩贈别來日君還在我前歸時我獨占君先氷寒斷道鳴駝外雪暗空村落雁邊畫省諸公扶日月南州孤客記山川松聲多處黃精好舉手青霞始學仙任城南自愛清遊自愴神五千里外獨歸身馬嘶平野呼鷹吏犬吠寒沙射雁人直北關山初合凍近南氣候漸知春蒼苔白石梅花路長憶驅車魯水濵魯橋發舟喜賦幾驛荒程不候雞坐車和夢向南馳才辭薛國沿清泗已指彭城望下邳榆栁無情隨日變風霜有力待人知二王臺下船如織誰薦香蘋酹一巵沛縣上濮王項王二臺秋夜獨立有懷秋老溪貧獨夜時笻枝移遍響蟲飛山城鼓疊月生海林屋燈寒風動扉帶雪關河人别久隔天書札雁來稀忘情闕有難忘者黃葉一庭霜滿衣偶成初啼山鳥篆香斜荏苒明時玩嵗華三日雨深春在水一林烟溼暖生花尋盟舊卷鈎簾展開禁新醅隔竹賒却憶去年歸漸近半篷殘雪上寒沙壬子元夕闕市人闕啼倦鴉常年歌吹稍喧譁夜風十里滅燈影春雪一林寒杏花凍濘漸深緘蟄户新灘微壯奪鷗沙西林樵客同爐炭閒試香芳品荈茶陳虛一尊師山房雨後一片閒心倚石壇千峰向背碧當軒海門雨氣懸虹影洞府香風粲鶴言絶艷槿花深映户生紅荔子密園村早知千里移家近久辦黃岡十畞園黃岡多荔枝寄鄉信謡俗傖荒越下州西風孤旅倦悠悠酒罏女靜花落樹魚市人歸潮滿溝鄉夢頻經關上月書題分寄海邊秋已期待臘西村畔春在梅花雪映洲種菊久客遂爾蕪蔓扶植成詩萟菊幽灣種種殊偶然久客遂秋蕪旋裁竹架扶枝􅉵頻汲泉花救本枯曉露漸寒覘綻否夜風微動覺香無幾多名品人應識倘有良工入畫圖得家信俗尚難公不取諧木隂深處玩蒼苔身拋世纍終相著心怯鄉書重一開極目雲天鴉陳黑滿林風雨雁聲來平生最有看花癖何處溪頭發早梅遇揭曼碩有贈時特賜其父荀坡貞文先生奉敕立碑十年相隔忽相見猶記書題獨故人京闕詩傳多應制里門碑建獨榮親梅花滿映林扉雪栁眼初迷輦路春知是高情難去住此身誰是自由身新淦畈步作松筠色潤翠成圍鵝鴨聲多水漸肥隔野販人爭野路迎年姹女試新衣暖烟黃栁知春到殘雪青山伴客歸茅屋酒旗隨處有悠悠世事儘相違黃籙醮道真法力貫穹圻炯炯靈襟感應機萬里東風人獨立一天杳霧鶴雙飛瑤壇封事披雲徹碧海逰仙戴月歸恰是廣寒新醮罷夜來花雨打窗扉元日聖主龍飛肇紀元野人相賀板扉前不知顔色老昨日共詫時光勝舊年井口杏花春食雨墻筐栁蕊暖肥烟長溝緩繞風猗緑林下烏犍漸受鞭讀荆公集古來遇合幾君臣無奈生為叔世身大志本難酬逺業諸公同是忌南人風高碧漢孤翻翮波蕩滄溟獨縱鱗每恨孔明參佐劣費禕蔣琬儘難倫又持方試藥詭能醫失著推枰却付誰東閣招延賔履散彤庭撫問使車馳蔣山舊宅僧堪託白下新詩栁最知宇宙茫茫經世事周官今又廢多時寄智玉成僧來能說近平安密抱陳編獨細看每恨故人疏覿易無情估客寄聲難四窗人寂百蟲語千里夢回新雁寒心事書題俱草草西山幾叠碧雲端閣皂山福地兩崖松竹緑蕭蕭時聽岩隂響野樵鶴信早歸題籙客蜂房分綴鍊丹竂晉時月在淦源淺粵國雲通勾漏遙仙馭肯忘僑鼎地風笙清夜落璿霄題墨梅江北江南春又動臘前臘後梅仍花三㸃五㸃雪孕魄一梢兩梢鐵擘杈枯根健迸石色潤半身倒偃溪流斜逃禪老人招不得樹穴探環今是邪題石橋未許興公知此山應真飛錫於其間隂凝黑霓落半胯夜凍銀河僵一灣偃月光通空翠眩回風聲靜雨花閒山中仙人渺何許去鶴三招殊未還乙丑元日村北村南笑語通銅罏香燼蠟燭融寒雞四起野霜縞清磬一聲天海紅老大情懷元壯士太平田里有東風續經且遜河汾手只擬新桃亦未工後正月草六日有喜縱橫亂帙翳山家且聽雙松啼乳鴉三日暖風生野色一川酥雨入桃花木多山市無人問恩重綸音有客誇贏得乘閒隨喜去溶溶春水繞平沙鄒悅道哀詞八窗九室失般倕善斫無人轉可悲曽就功名遭記録竟將文字老明時門生定展王通學舊友誰成郭泰碑無限哀悰歌不徹落花如雨暮雲垂自羅源㳂溪尋梅得之喜賦羅源波畔野梅稀流水油油引步遲曲塢深烟將淡處前峰薄雪欲消時槎摧鐵幹緑苔㸃梢拔霜條丹萼敧說影談香花定厭迎寒袖手倚疏籬㑹吳學士于山水村仙家山水欎葱邊今日重來翰苑仙五百里間星象動一千年外畫圖傳晦菴畫於聚星亭寒泉㑹粹書還就短簡賡酬句倍鮮不待職方添記注門生語録已成編黃氏塵外亭金華仙子與神謀别有乾坤作勝遊天外客來談太極洞中日永對紋楸花香四合島霞曉笙響一飛山月秋誰道蓬萊三萬里一壺元只在街頭壽吳草廬八十四朝加禮聘車勤又際龍飛沐異恩聖主執經常賜坐大官承學盡趨門格天勳業身徐退平地神仙道愈尊春有八千才八十桃花紅嫩酒盈樽題金石録即雲萍録胸中舒卷任閒情塵介何由置重輕虞子自知書可著伯夷非待史為名碧雲一夕度歸雁紅雨千林啼晚鶯聚散偶然無足計世間甲子又新晴贈墨者侯生逺心每計百年寬壯事俄歸兩鬢斑周鳳不鳴詩已廢魯麟無迹史難删寒隂十日雨花急長嘯一聲雲影還多謝侯生墨如漆草堂無宇可斒斕庚午上元是年江西大饑九野淒涼魂不招又知今夕是何宵叢祠月黑寒鴟聒山市烟深臘雪消遺事誰編傳舊俗夢華有記録前朝一枝桕燭闕然處香譜茶經共寂寥楓陂即事幾杯殘雪寄遙岑一舸輕嵐並曲潯晴氣貫山虹碧動暘光著栁粉黃深衣裳炫路通鄰里鼓笛粘燈聒杜林左顧右瞻忘費日老人態度少年心七言排律黃養浩得水石山有詩自和索余同賦壺中未識九華竒先讀坡公唱和詩天竺分峰應佛送仇池通穴許仙窺拾時山靜雲相伴歸處家遙月共隨書史軒窗多勝賞蕙蘭蹊徑換幽規花邉汲井泉頻滌竹下安盆几隱闕百匝端詳無闕喜四鄰驚訝頗成疑家童習懶愁添約野客生貪黠欲攜已廢朝眠迎露立更疏晚講對霞敧人言每事皆為纍我謂高情未易知儘見蓬萊幾清淺菖蒲遮莫待花遲知非堂稿卷五
