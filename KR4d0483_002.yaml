body:
  text: 知非堂稿卷二元何中撰五言古詩贈元復初二首暖雲流青堤光風轉芳甸逺在天一涯幽沉限聞見㸃㸃秋歸鴻翩翩春來燕天路萬里通胡寧絶遐睠竒姿奪南國悵望愧疎賤良㑹慰夙心願君畢歡宴其二朝采山巔芩莫採澗中藻心同媒豈勞結言不在早深知各偃蹇非要一時好託輕身易捐百年不速老緑隂鶯亂啼相攜玩芳草區區幸識察庶得堅所保春風如少年效程漢翁春風如少年狂逐無定處垂楊曲江隄細草東郊路祇言今似昔不悟新非故流水何時歸殘鶯數聲暮西湖山峩峩西湖山靈秀入空碧蘿隂轉累磴松色漬幽石㣲霞生絶陘飛溜洒欹壁鶴鳴岩光動花落雲影拆危椒登古壇百年此一息聲影混大荒不見興滅迹剛風三天寒元氣萬里色悵望仙子期凝神撫𤣥極皈信寺近曽文昭公墓次緑柘茅舍村青山晚烟渡何處櫂歌還直入深林去隔畈數聲鐘鴉啼翰林墓程氏山房燕集是麻源第三谷芳村暖微煦衆岫分餘烟逶迤望逺壑趣得心轉延洞開石扇仄磵阨潨流喧居人隱古俗香氣通幽禪艶緑度畫梁語笑相後先飄飄縱飛屣松聲正鏘然窈窕山曲􅔍麗搆朝霞鮮勲庸在廟廊傑閣儲芸編緬懷康樂公竒蹤此周旋詎知有今夕聨集玉堂仙羣鵠亦與喜共舞芳尊前無情尚相感矧當後諸賢暢飲抱真適逺心寄㣲言兹遊即千載湛輩期俱傳招仙觀逶迤溪南路窅窕招仙谷空堂兩道人殘碁映深竹一葉響疎籬雙鴉啼髙屋出門隨歸人逺燒在山麓知非堂夜坐前池荷葉深微涼坐來爽人歸一犬吠月上百蟲響余非洽隱淪隙地成偃仰林端斗柄斜撫心獨悽愴逰樂安穆山寺秋隂出南郭佳色來逺山悠然渡野水却宿前林間朝氣銳幽步相攜上孱顔行穿緑蘿逺共愛青杉閒已窮高原路忽得雙石闗飛烟帶香氣深木藏幽潺景晏鐘磬寂桂花滿苔斑道人一尊酒時聴風珊珊多悟從此始塵縁諒能刪空廊對㣲雨亦復不知還宿田家村暗烟火生林深雞犬静麥花如積雪月色淡相暎鄰家夜汲歸寒蟲滿幽徑發新淦金水亭振衣上野航囬首謝山阪日淡秋水空風清片㠶逺沙光侵岸發峰影隨人轉前渡烟火深離亭路今緬小孤山牽牛與織女河漢有時渡小姑緑髮深隔與彭郎語流水去仍囬望郎郎不來精神有相貫形跡難相猜年蕐朝又暮江頭晴又雨靈風吹斷磯行人聴鐘鼓曉發辭夫磯時李泂溉之友先行荻暗雞鳴村平皋下殘月參差鄰舫語櫓聲帶潮發露華望中白篷隂散秋髮沙鳥知曙鳴海雲上空滅念我前行友青山已飛越遲爾及相攜無嗟賞心歇龍潭阻風夜興水宿滯前期前津北風惡林寒燈影深莎雞滿籬落荒忽寄孤逈凄清愧離索年光星河轉夜氣衣裘覺我前勁翮翻我後大魚躍潮痕侵栁根移船避沙閣淮隂古城牛羊上荒城茅茷深樵路鐘室嘆良弓此有韓王墓徇名本何成早被鄼侯誤閒尋舊釣磯杳渺蒼波暮望新安山投宿不及踰淮數百里欣逢下邳山新安十數峰窈窕霞影間遥看若可即既近杳難攀契深迹莫遂悵然空厚顔倦鷺辨沙落逺禽求村還已暮將何歸囬濤冒瀴灣渡口雙古栁茅茨相與環清時寄孤枕敢厭聞驚潺歌風臺神魚鶩逺海雄鵠陵高𤣥區區一亭長帝業何赫然光芒三尺劒羣雄讓鋒先嬴項屹山岳掃滅如飛烟故鄉偶一歸父老相周旋百感忽中起深情何由宣徃時同功人今乃不一全害能亦寧忍逺計有未便竛竮視孤影三侯發尊前丈夫英雄氣兒女淚迸泉縱觀能幾時憂虞浩無邊西風吹古臺老屋欹河壖低徊一長嘯乾坤多材賢登李白酒樓當時謫仙人四海蜚英聲偶然此一醉遂有無窮名叔世尊放曠中度翻為輕頺波浩難返憂思誰能平同鄉客遥見江西船認是同鄉客何日發龍興迎人問消息長河落雁秋古渡啼鴉夕不見楚天長重重暮雲色影兒灣看落日𤣥識超象外精聞洞心知諒非耳目及難用尋常疑杳杳大荒濶紫毫散天西垂輪忽漸側緑水浮金龜昔我事畊釣嚴溪恣愚癡秋風影兒灣夕景無前竒六竒孰云廣余行亦非迷揮弦訪太容鍊石尋安期酬掲曼碩重贈歳晏君獨留路長我將發林居難共語帝里易成别煮水逐人飯依樹因車歇今夜抱衾眠街頭響鐘絶宿十里村朝出順承門暮宿十里村臂鷹獵騎歸積雪明郊原居人喜客來汲井鄰墻温羮湯稍暖熱餅餌亦燒燔此夕羇旅意深知路人恩重林隱城堞昉此勞心魂涿州道間雪霽昨日飯良鄉今夕涿州城此路有終去安能緩車聲平野散寒景流輝起浮英濛烘逺樹密落削僵栁明獝律共鴉牧團瓢忽雞鳴殊方雪初霽余抱孤賞情胡爾同車人苦云路難行河間曉行歸人心久歸車夫苦相促衣裳急披攬衾毯自裝束寒深肌骨痛夜久情懷獨萬里多徃還他人媚僮僕霜枝呌羸雀雪徑過山鹿望墅欣海霞辨烟識村屋飢尋麥粉麄到夕當得粥南中好男兒閈廛絶行躅河間堠子多毋煩記生熟早發東阿午經東平晚宿汶上是日雪嚴裝齊地曉授館魯鄉暮天寒客心速雪下車聲去迷獸出桑畦流人披野路淺靄須城山斜橋汶津樹前聖有遺業惝惘經行處荷蓧與耦耕何其得深趣淮安道中鐘聲起前林悠悠向南客天垂大野髙月淡行路白鷄犬淮上村雲霞海邊色舊時塞垣地來徃人馳驛得風自施團一日至梅根泝㳺縮程期景氣異昏旦波聲船頭響旗尾檣竿轉施團方入望忽過繁昌縣雄吹徹奫㝠隂色形怪變凌虚曠超軼坤六酣龍戰幾日西南風去㠶眼中羨蒼蒼水雲鄉九華今不見南浦旅懷鄉近嵗已闌猶為候風客落霙盖篷深三日不知息浦樹分城烟水明逺沙色滿筐紅竹枝渡人隔村夕久滯妻孥望孤還友朋惜音形兩暌離情生自難抑朱方偶作雪餘春水生日上暖雲泮杳靄松林中柴扉起樵㸑新粧攜童稚鄰曲欣年換坎坎村鼓鳴沙頭酒聲亂江西田家樂豐嵗猶盛觀山市溪橋春還多看燈伴訪程漢翁不遇賦寄高躅洽㝠棲鈍資得暌阻逢人問來期指日徃城府俄聞幽軨至迎候急江滸沙栁歸流風隂虹割飛雨還同騎馬客尋竹叩深户多藴喜頓傾失覯還茹苦度鳥遺還聲緘情促歸武怊悵新城雲秋山事晴嫵幸因掲陽侯謂曼碩也日日問𤣥悟酬彭通復懷友見及之作疇昔到沙歩芳時感嚶鳴日華起闕采林香散樹英虚館許行李輕闕下鍾陵還期念當逺枉矚欣欲驚新句出良斵慵疎媿專精天質謝人飾狀妍終莫能程兄守丘壑掲弟闕神京出處各乖濶能不勞深情蹇劣忝相厚如何歸思縈溪人尚貞素迷復懸清評暮行城東懷程漢翁因寄倚郛起遥悲日下滄波闊何處是新城層峰翰飛滅始反今悔誤沉想還成結百里詭稱遥長年忍為别囬風歸山霞道景發沙月獨殷今夕情凄迷轉城闕丹霞洞天飛舄落丹霞蒼然洞天劃草木皆異香烟雰有靈色寒苔潔宜坐幽水甘可滌樵子指峯賞野翁教藥摘琳宫積筠隂慮消景難昃道人供仙茗亹亹古所歴唐王懸舊照唐帖式遺墨使年知幾何山前事多易稽首浮丘翁歸與紫𤣥宅照武西塔山報恩寺山椒敞禅扃幽欣失㣲倦密林稍深沉新笋亦葱蒨磴折迎空香臺虚得清囀芸芸趨前塵徃徃遺勝踐始知佛力𢎞能使地靈見市聲俯一席山色照三面郡小覽易窮興高賞難徧㣲生諒何縁周流散遐睠浴侯官湯泉天氣稍清穆槳聲泊荒津湯泉洌山半取徑娱幽淪解帶散疎髮掊漪澡閒身暢然肢體舒洒若襟懐新其下多嘉樹細花落繽紛和風來樹間芳氣通㣲辛繁隂屢移席俄令鳴鳥親無為急行返殷勤謝舟人三仙謡紅紗籠玊香金翠綉鴛小鶴頂壓青絲斜戴花枝裊何方馬上郎下馬佯驚悄羅扇掩㣲頳答語相縈繚郎有千金重妾惜容華少怕不稱郎心看郎幾曽老苦熱得雨炎徳王甌駱羈羸負天刑不為氷谷留乃使熟阪經几席集蠅蚋輿臺亂猱鼪居煩易激疾習静難遺形每倚高閣立但愛方山青林端動虚籟殿角摇飛霆雨影襲虹氣土香襍龍腥翛翛改神慮肅肅賔仙靈散襟淡幽佇稻花如雪馨九日屬耳喧令序虚旻景清温久生理難期陽徳聖所尊菊籬黄未拆茰枝緑初繁時茰尚青幽嵎寡芳物離索誰相存白日照杯酒壺山落秋痕高歌行太清海翳開渾渾倚伏祥視履登高倦躋攀化機何由息悠哉委乾坤壺山絶頂望海縈磴入蒼靄斷崖倚晴暾天飈盪闕駛蜃氣迴矚昏磐石偃危椒谷王浩無垠鳴交羣龍戰舶㸃㣲鷗翻浮雲岌雲朶懸霄浴霞根空浴東南突䢔闕日月門指數十洲翳招呼九仙存余懷已瀁瀁前境方渾渾乗槎寄虚感㣲迹猶當論登九仙山仙何姓兄弟九人吾宗九仙人鍊藥此山上渺渺嘉遯心乗烟一相訪海門葱蘢外山氣嵽嵲狀側目明逺潮歸霞委孤嶂塵縁誤良契仙事敦夙尚何處乗鯉歸㣲風起清漾烏石山天王寺天王小精廬山角臨城闉古稱藩服雄異境環相陳塔影六七枝瓦縫千萬鱗烟明南臺樹潮壯方山津老僧肯前揖似余異人人指㸃壁間畫修廡行逡廵觀音大士在維摩妙悲顰蒼然古木隂寒山砦可親板扉幾尊者一一皆風神老僧太息言刼餘偶遺珍從今幾年算此壁終成塵余笑謂老僧子意亦良勤適見俄已失當悟無還真黄溪口看白水黄溪且緩程白水方迎賞石扇千餘仭雪源數百丈幽光照天動寒氣發地爽松杉含清英猿鳥玩竒響仰視葱蔚中當得一席敞移家結香茅抱書寄泉上訪貢仲章舟行阻風今旦始自信余生非数奇懷人發清興欲雪成良時波響雙櫓澁灘寛衆㠶馳危查立小渡殘竹懸斷旗指浦見鴉合轉蓬惜峰移深烟曲江磬微雨三洲炊寂闃有餘適濛鴻無定姿余寧不可奈久與西山期送人歸臨川雖云有朋友音素猶難之奕奕大藩地遽得歡㑹時飛霙散寒威勝賞應前期高樓酒深注簡畧窮談諧但感人似雪頃刻合有離何當雪如雲恒見堪相追雁下浦含暝川寒人去遲年華委分首誰能計推移雪中重過黄沙環環磴屢折剡剡峰争迴木隂與石浃梅花抱泉開長思黄沙好每待春雪來陽和發坤厚寒霙失貞材引雲賈余勇隂飇行新媒垂成一川雪歩歩當徘徊杉竹懸明氷琚璵遞清哀叢石動溪響叫吭出林隈含欣耦孤闕迎賞刓蒼苔夙昔多親友茲焉起余懷早起覺來日已升花梢衆禽語何許白浮萍池間散還聚起見梅已空夜來幾更雨魚行春到水草暖香在露溪上人語喧樵薪滿沙路撫州魏壇觀何年女仙壇百歩逺城堞樹色隨春新飛花襲枯葉廊虚苔緑重簾静藥香浹主人勉逢迎小憩薄茗呷却讀魯公碑仙事公素愜是時中興頌筆力泰華壓此書最為小勁氣亦嶪嶪大節照古今片石即光曄人生果何為草草度塵刼揮手謝壇扉天長碧雲疊鍾陵紫極宫寫韻軒晚立擇勝委清矚空軒横晚晴遥屏散脉縷毫髮分昏明沙鳥雙復隻林烟濁還清蒼旻貯止水白雲載舟行接要居郡最翫竒盡天成當時寫韵人此寄千古情招之不可得暮磬長廊聲洪都靈應觀榜雲徑厭煩取蕭閒隨意入雲徑上堂敲響板山童質辭令地寂室生涼體暢心逾静出門看木隂佳鳴發清聴風光勻可愛水色艶相暎真契成自怡歸路得新詠城市今滯留將無失幽性新淦太平山縱觀不知逺言登太平山諸峰卷秋雨日射風霏間懸磴折古石側溪倒危潺金燈如丹紅異蘤相斕斑忽悵經丘絶俄欣尋壑閒筠隂聚森爽樵人指幽闗鐘聲出晻靄演梵作孱顔静者足吾契語瑩氷珊珊崖東野月上露華膏夜鬟松杉炯玲瓏流飈過瑶環既静有餘聽焉知趺坐頑偶然在塵表非能悟無還崇仁鍾山寺宋樂史侍郎有詩在寺方看望仙雪仍訪鍾山泉石限阨危溜峽崖減青天不知路深淺但愛山蒼圓俄驚侈樓觀一禮黄金仙衲僧喜客來觴行續茶煎仰視慈竹題俯吟慈竹篇前修凛髙躅滋久餘芳傳白日倚山轉倒暈千峯烟悠悠思難極且與樵風還櫪溪林嶺甚可愛溪源無盡時山花已亂發烟暖東風遲因與採樵者坐談樹隂移日斜自歸緩我興非人知立秋日雨律候秋序改午隂𤣥雲飛驚霆發雄殷甘洒行空霏迸響下清鏑激花裂明璣餘涼泛匡床薄潤通練衣草木轉異色山川起榮輝𢎞敷三儀徳燕及浮生微棐几亂書帙撫之有餘欷聖言角相詭人理還多違山田秀加穎歸息期林扉壬戌夏五及陳宗元㑹于富州下横黄氏蕙樓罷看雨稚緑新成隂流風淡欲留泠泠山鶯吟美景天氣和闕臨情真語易契趣逺領闕深上客賢主人蒲香酒頻斟交歡不知醉詎計西日沉談笑偶一時流傳成古今毋為略斯集異世當追尋河湖市岐山觀與友人皮季武同遊旦旦望岐山樛木森山椒其下美清䕃仙真集蕭寥佳友謝塵盧導余度飛橋危潨濺跳雪石磴蔵靈飇探邃裂凝隂凭顛洞遐霄寒蒼貫晴紫滉瀁峰壑摇久無登臨適快此煩塵消日馭諒難迅人區亦非遥遲遲敢迷復亹亹同歡謡豐城疎山寺天氣良晏温山原足游衍石溪試初涉衣裳費牽挽油油風力舒恍恍煙色逺指峯左右賞愛草行坐軟情興俱笑談造詣各深淺望望蒼寒中禪闗路猶緬樟樹鎮五公寺久幽厭拘維蹔弛欣舒散近闗得禪扉擇步歴蒼蘚沉沉松隂重灧灧水光逺殘花起餘香乳禽響新囀虚廊清畫長髙僧坐談簡學室素所昧慮妄還自遣移晷始知歸生烟滿林晚清江鎮靈峰寺員嶠亭㧞迹囂塵區置身清涼境深深蒼松林炎曦不通影松根得散坐肅然心自醒閒草膏以緑新蟬咽而警元非造幽邃已足移視聴何當真物外無慙虚與靜重到山水村往時山水村曽駐老仙策俄然二十暑重到髙陽宅著書邁前聞析理發新益盛集天為成髙情世難識繄余最疵謬每幸親講席怊悵俯仰間均能髮鬚白山沈空外青川停雨餘碧櫪章懸舊隂蓮蕩起生色上客詎可期佳時諒難得亹亹後來人遐追撫行迹送凃雲章北逰奇璞閟偉器喬林長珍材國工久寂寞甘伏巖壑隈清廟九筵煥明堂八牕開良時難再得振衣起蒿萊流風寫空江迴舟越清淮直上到薊門故人與談諧所來非迷方咸㲈奏天階燕昭稱誼辟樂毅名髙才區區寧足道鄒劇何為哉六龍正御天走奔風雨雷奚待一孔薦自宜四䕫偕素抱飾王度聲光遊江垓古來致身者不為雲山懷珍重闕垂芳在深培尚令王子囦善頌端能裁病起舒懷常時不知老衰病遽見侵入喉飯若仇毒腸藥難禁始終理夙徹羇旅情自深朋友各相念撫憐出真忱踰旬幸能起四體危嶔嶔幽舒雨新寄緑光傾逺林疎籬上孤蝶石笋跳雙禽油油好風來迎之散衣襟欣然若可飲清爽空煩心平生事聖學學定詎能任惟應委此身天壤俱浮沉閤皂山鳴水臺兩山阨一峽幾丈落寒水蜀灘春濤壯呉江夜潮起靜聴得天韻㝠參洞𤣥理遽得還未能淹回成自喜幸兹有臺亭緑䕃極清美霏霏林香生郁郁山光委本非塵土胸偶此一流憇所聞盡心聞我耳毋煩洗持志堂蒼玉軒仙家葛源上空涼敞崇軒肅肅嘉䕃靜泠泠清韻傳軒中有髙人讀書事丹鈆尚友惟此君恍若物外仙循名乃綦貴比徳尠莫言孚尹自旁達温潤而栗然粹質生不瑕直節久彌堅風烟與雨雪萬變俱盛妍偉哉干霄志孫枝益綿綿尚令後來者毋忘淇澳篇李氏淡香亭清泠一渠水窅窕五畝園相攜步荒徑左右花藥蕃好風颯而至語笑興彌敦勝日得佳景占星詎虚言散憩一小亭繚以衆菊根嵗寒淡香趣深奇難具論盛年值明世奇翮當髙騫秋容與晚節豫訂此道存林氣漾華艶珍材美璵璠今夕果何夕殷勤屬芳樽劉崇正秀才金伯修髙士自閤皂山來訪余樟樹鎮值大雪時余抱病病愈賦别雲凝雨不霔風定霰未先茸茸數素塵轉轉遊輕鈿萬花開闕寂千林耀春妍景麗佳興發二妙來髙軒旅館共清坐雙璧暎談𤣥余衰得奇疾藥鼎煩烹煎明明桑輿義尚友千載前念昔戴安道可以與之言胡為王子猷竟返中夜船雪罷洗峰岫歸情勝剡川寄謝山中人丹訣期相傳儒學提舉司宴集賤子久在野低頭事躬畊堂堂賢宰輔胡為知姓名許辭庠序責復假賔師稱仰既慚簡書俯仍媿輿評公館良宴㑹文雅有餘清粲粲珠玉質嗈嗈鸞鳯聲深意修綆汲雄辨四筵驚我哀但多感一出寧非輕白日照天碧耿耿梅花明城南有歸路西山能送迎除日文江書懷馳外心久息求安志恒違江受風雪壓㠶從波浪飛眄彼東山雲妄行已是非為誰餞殘臘蕩漾不知歸沉沉州郭暝黯黯烟火稀流坎理多悟孤暌情自微寄題天光雲影樓城南有髙樓樓髙莫與儕上接銀河流下臨寶鑑開玲瓏八牕境洞徹萬里懷至人泰宇定靈根固深培不假日月輝長照神明臺倒射屹不動幻翳要難裁初萌朝菌幽轉作冥鴻來須臾忽變滅炯炯無纎埃冥㕘足多悟内定外自諧倚欄視下方此心良悠哉知非堂稿卷二
